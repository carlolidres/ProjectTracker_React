  function loadSupportActivities(force) {
    if (AppState.loaded.support && !force) {
      renderSupportTable(getFilteredSupportRows());
      return;
    }
    runServer('getSheetData', [SHEETS.SUPPORT], function (result) {
      AppState.loaded.support = true;
      AppState.supportRows = (result && result.rows) || [];
      renderSupportTable(getFilteredSupportRows());
    });
  }

  function getFilteredSupportRows() {
    return filterSupportRows_(
      getInputValue('supportSearch'),
      getInputValue('supportKindFilter'),
      getInputValue('supportDepartmentFilter')
    );
  }

  function filterSupportRows_(searchValue, kind, dept) {
    const search = lower(searchValue);
    return AppState.supportRows.filter(function (row) {
      if (search) {
        const blob = Object.keys(row).map(function (key) { return row[key]; }).join(' ').toLowerCase();
        if (blob.indexOf(search) === -1) return false;
      }
      if (kind && valueOrNA(row.activity_kind) !== kind) return false;
      if (dept && valueOrNA(row.Department) !== dept) return false;
      return true;
    });
  }

  function renderSupportTable(rows) {
    const host = byId('supportTable');
    if (!rows.length) {
      host.innerHTML = '<div class="empty-state">No support activities found.</div>';
      return;
    }
    host.innerHTML = buildTable(SUPPORT_COLUMNS, rows, function (row) {
      return '<tr>' +
        SUPPORT_COLUMNS.map(function (col) {
          const value = col.key === 'project_id'
            ? supportProjectIdHtml_(row[col.key])
            : escapeHtml(formatDateDisplay(row[col.key]));
          return '<td>' + value + '</td>';
        }).join('') +
        '<td class="actions-cell">' +
          '<button class="row-action button-with-icon" data-edit-support="' + escapeHtml(row.activity_id) + '">' +
            iconSvg_('edit', 'button-icon') + 'Edit</button>' +
          '<button class="row-action danger button-with-icon" data-archive-support="' + escapeHtml(row.activity_id) + '">' +
            iconSvg_('archive', 'button-icon') + 'Archive</button>' +
        '</td>' +
      '</tr>';
    }, 'Actions');
    bindSupportProjectLinks_(host);
    host.querySelectorAll('[data-edit-support]').forEach(function (button) {
      button.addEventListener('click', function () {
        openSupportModal(button.getAttribute('data-edit-support'));
      });
    });
    host.querySelectorAll('[data-archive-support]').forEach(function (button) {
      button.addEventListener('click', function () {
        confirmArchiveSupport(button.getAttribute('data-archive-support'));
      });
    });
  }

  function loadArchived(force) {
    if (AppState.loaded.archived && !force) {
      renderArchivedTables();
      return;
    }
    runServer('getArchivedData', [], function (result) {
      AppState.loaded.archived = true;
      AppState.archivedProjectRows = (result && result.projects) || [];
      AppState.archivedSupportRows = (result && result.support) || [];
      renderArchivedTables();
    });
  }

  function renderArchivedTables() {
    renderArchivedProjects_();
    renderArchivedSupport_();
  }

  function renderArchivedProjects_() {
    const host = byId('archivedProjectsTable');
    const rows = AppState.archivedProjectRows || [];
    if (!rows.length) {
      host.innerHTML = '<div class="empty-state">No archived project records.</div>';
      return;
    }
    host.innerHTML = buildTable(DATABASE_COLUMNS, rows, function (row) {
      return '<tr>' + DATABASE_COLUMNS.map(function (col) {
        const value = col.key === 'project_id'
          ? projectLinkHtml_(row[col.key])
          : escapeHtml(formatDateDisplay(row[col.key]));
        return '<td>' + value + '</td>';
      }).join('') + '</tr>';
    });
    bindProjectLinks_(host);
  }

  function renderArchivedSupport_() {
    const host = byId('archivedSupportTable');
    const rows = AppState.archivedSupportRows || [];
    if (!rows.length) {
      host.innerHTML = '<div class="empty-state">No archived support activities.</div>';
      return;
    }
    host.innerHTML = buildTable(SUPPORT_COLUMNS, rows, function (row) {
      return '<tr>' + SUPPORT_COLUMNS.map(function (col) {
        const value = col.key === 'project_id'
          ? supportProjectIdHtml_(row[col.key])
          : escapeHtml(formatDateDisplay(row[col.key]));
        return '<td>' + value + '</td>';
      }).join('') + '</tr>';
    });
    bindSupportProjectLinks_(host);
  }

  function isActiveClientRow_(row) {
    const flag = row && row['Is Active'];
    const text = String(flag === undefined || flag === null ? '' : flag).trim().toUpperCase();
    return flag === true || text === 'TRUE' || text === '';
  }

  function loadAuditTrail(force) {
    if (AppState.loaded.audit && !force) {
      renderAuditTable(getFilteredAuditRows());
      return;
    }
    runServer('getPagedSheetData', [SHEETS.AUDIT, { limit: 500, offset: 0, filters: {} }], function (result) {
      AppState.loaded.audit = true;
      AppState.auditRows = (result && result.rows) || [];
      renderAuditTable(getFilteredAuditRows());
    });
  }

  function getFilteredAuditRows() {
    return AppState.auditRows.filter(function (row) {
      const search = lower(getInputValue('auditSearch'));
      if (search) {
        const blob = Object.keys(row).map(function (key) { return row[key]; }).join(' ').toLowerCase();
        if (blob.indexOf(search) === -1) return false;
      }
      const module = getInputValue('auditModuleFilter');
      if (module && valueOrNA(row.Module) !== module) return false;
      const action = getInputValue('auditActionFilter');
      if (action && valueOrNA(row.Action) !== action) return false;
      const user = lower(getInputValue('auditUserFilter'));
      if (user && lower(row.User).indexOf(user) === -1) return false;
      const project = lower(getInputValue('auditProjectFilter'));
      if (project && lower(row.project_id).indexOf(project) === -1) return false;
      const start = getInputValue('auditStartDate');
      const end = getInputValue('auditEndDate');
      if ((start || end) && !dateInRange(row.Timestamp, start, end)) return false;
      return true;
    });
  }

  function renderAuditTable(rows) {
    const host = byId('auditTable');
    if (!rows.length) {
      host.innerHTML = '<div class="empty-state">No audit records found.</div>';
      return;
    }
    host.innerHTML = buildTable(AUDIT_COLUMNS, rows, function (row) {
      return '<tr>' +
        '<td>' + escapeHtml(formatDateTime(row.Timestamp)) + '</td>' +
        '<td>' + escapeHtml(valueOrNA(row.User)) + '</td>' +
        '<td><span class="audit-action audit-action-' + lower(row.Action) + '">' +
          escapeHtml(auditActivityText_(row)) + '</span></td>' +
        '<td>' + auditReferenceHtml_(row) + '</td>' +
        '<td class="audit-details-cell">' + auditDetailsHtml_(row) + '</td>' +
      '</tr>';
    });
    bindProjectLinks_(host);
    bindSupportProjectLinks_(host);
  }

  function auditActivityText_(row) {
    const action = valueOrNA(row.Action);
    const module = valueOrNA(row.Module);
    const noun = module === 'Projects' ? 'project record'
      : module === 'Support Activities' ? 'supporting activity'
      : module === 'Registry' ? 'registry value'
      : lower(module);
    if (action === 'CREATE') return 'Created ' + noun;
    if (action === 'DELETE') return 'Archived ' + noun;
    if (valueOrNA(row['Field Name']) !== 'ALL') {
      return 'Updated ' + auditFieldLabel_(row['Field Name']);
    }
    return 'Updated ' + noun;
  }

  function auditReferenceHtml_(row) {
    const projectId = valueOrNA(row.project_id);
    const recordId = valueOrNA(row['Record ID']);
    let primary = '';
    if (!isMissingValue_(projectId)) {
      primary = row.Module === 'Support Activities'
        ? supportProjectIdHtml_(projectId)
        : projectLinkHtml_(projectId);
    }
    const secondary = !isMissingValue_(recordId)
      ? '<small>' + escapeHtml(recordId) + '</small>'
      : '';
    return '<div class="audit-reference">' + (primary || '<span class="na-text">' + NA_VALUE + '</span>') + secondary + '</div>';
  }

  function auditDetailsHtml_(row) {
    const field = valueOrNA(row['Field Name']);
    const oldValue = valueOrNA(row['Old Value']);
    const newValue = valueOrNA(row['New Value']);
    const remarks = valueOrNA(row.Remarks);
    if (field !== 'ALL') {
      return '<strong>' + escapeHtml(auditFieldLabel_(field)) + '</strong>' +
        '<span>' + escapeHtml(auditDisplayValue_(oldValue)) + ' to ' +
        escapeHtml(auditDisplayValue_(newValue)) + '</span>';
    }

    const payload = safeJsonParse_(newValue) || safeJsonParse_(oldValue);
    if (payload) {
      const summaryFields = row.Module === 'Support Activities'
        ? ['activity_kind', 'Department', 'Material', 'Principal', 'Product', 'Target_Date']
        : ['project_owner', 'activity_type', 'client_name', 'product_name', 'po_control_no', 'fg_month', 'final_status'];
      const details = summaryFields.filter(function (key) {
        return !isMissingValue_(payload[key]);
      }).slice(0, 5).map(function (key) {
        return '<span><strong>' + escapeHtml(auditFieldLabel_(key)) + ':</strong> ' +
          escapeHtml(auditDisplayValue_(payload[key])) + '</span>';
      }).join('');
      if (details) return '<div class="audit-summary-list">' + details + '</div>';
    }
    return '<span>' + escapeHtml(isMissingValue_(remarks) ? 'Record-level change completed.' : remarks) + '</span>';
  }

  function auditFieldLabel_(field) {
    const known = HEADER_FIELDS.concat(BATCH_FIELDS, MO_FIELDS, PO_FIELDS, SUPPORT_COLUMNS).find(function (item) {
      return item.key === field;
    });
    if (known) return known.label;
    return String(field || '').replace(/_/g, ' ').replace(/\b\w/g, function (char) { return char.toUpperCase(); });
  }

  function auditDisplayValue_(value) {
    if (isMissingValue_(value)) return 'Not provided';
    if (String(value).toUpperCase() === 'TRUE') return 'Yes';
    if (String(value).toUpperCase() === 'FALSE') return 'No';
    return formatDateDisplay(value);
  }

  function safeJsonParse_(value) {
    if (isMissingValue_(value)) return null;
    try {
      const parsed = JSON.parse(value);
      return parsed && typeof parsed === 'object' ? parsed : null;
    } catch (error) {
      return null;
    }
  }

  function loadRegistryPage(force) {
    if (AppState.loaded.registry && !force) {
      renderRegistryTable(getFilteredRegistryRows());
      return;
    }
    runServer('getSheetData', [SHEETS.REGISTRY], function (result) {
      AppState.loaded.registry = true;
      AppState.registryRows = (result && result.rows) || [];
      renderRegistryTable(getFilteredRegistryRows());
    });
  }

  function getFilteredRegistryRows() {
    const type = getInputValue('registryTypeFilter');
    return AppState.registryRows.filter(function (row) {
      if (row.Status !== 'Active') return false;
      if (type && row['Registry Type'] !== type) return false;
      return true;
    });
  }

  function renderRegistryTable(rows) {
    const host = byId('registryTable');
    if (!rows.length) {
      host.innerHTML = '<div class="empty-state">No registry values found.</div>';
      return;
    }
    host.innerHTML = rows.map(function (row) {
      return '<div class="registry-row">' +
        '<div class="registry-value"><strong>' + escapeHtml(row['Registry Value']) + '</strong><span>' + escapeHtml(row['Registry Type']) + '</span></div>' +
      '</div>';
    }).join('');
  }

  function prepareNewProjectForm(reset) {
    AppState.editingProjectId = null;
    AppState.activeProjectTab = 'AM/BM/PL';
    AppState.duplicateHighlights = {};
    AppState.hierarchyOpen = {};
    AppState.projectDraft = emptyProjectDraft();
    runServer('getNextProjectId', [], function (result) {
      AppState.projectDraft.project_id = (result && result.project_id) || '';
      renderProjectFormHost();
      if (reset) showToast('Form cleared for a new project.', 'success');
    });
  }

  function startProjectForm(projectId) {
    AppState.editingProjectId = projectId;
    AppState.activeProjectTab = 'AM/BM/PL';
    AppState.duplicateHighlights = {};
    AppState.hierarchyOpen = {};
    if (!projectId) {
      prepareNewProjectForm(false);
      return;
    }
    runServer('getProjectById', [projectId], function (project) {
      if (!project) {
        AppState.editingProjectId = null;
        AppState.projectDraft = emptyProjectDraft();
        showToast('Project "' + projectId + '" was not found in the connected Project Database.', 'error');
        renderProjectFormHost();
        return;
      }
      AppState.projectDraft = normalizeLoadedProject_(project || emptyProjectDraft());
      AppState.projectDraft.project_id = projectId;
      renderProjectFormHost();
    });
  }

  function clearProjectForm() {
    prepareNewProjectForm(false);
  }

  function emptyProjectDraft() {
    return {
      project_id: '',
      project_owner: NA_VALUE,
      activity_type: NA_VALUE,
      client_name: NA_VALUE,
      so_no: NA_VALUE,
      fg_code: NA_VALUE,
      product_name: NA_VALUE,
      batches: [emptyBatch()]
    };
  }

  function emptyBatch() {
    return { batch_instance_id: generateLocalId_('BAT'), unique_batch: NA_VALUE, mo_controls: [emptyMo()] };
  }

  function emptyMo() {
    return { mo_instance_id: generateLocalId_('MO'), mo_control_no: NA_VALUE, po_controls: [emptyPo()] };
  }

  function emptyPo() {
    const po = { po_instance_id: generateLocalId_('PO') };
    PO_FIELDS.forEach(function (field) {
      if (CNF_FIELD_KEYS.indexOf(field.key) === -1) po[field.key] = NA_VALUE;
    });
    po.cnf_entries = [emptyCnfEntry_()];
    return po;
  }

  function emptyCnfEntry_() {
    const entry = { cnf_instance_id: generateLocalId_('CNF') };
    CNF_FIELD_KEYS.forEach(function (key) { entry[key] = NA_VALUE; });
    return entry;
  }

  function normalizeLoadedProject_(project) {
    (project.batches || []).forEach(function (batch) {
      if (isMissingValue_(batch.batch_instance_id)) batch.batch_instance_id = generateLocalId_('BAT');
      (batch.mo_controls || []).forEach(function (mo) {
        if (isMissingValue_(mo.mo_instance_id)) mo.mo_instance_id = generateLocalId_('MO');
        (mo.po_controls || []).forEach(function (po) {
          if (isMissingValue_(po.po_instance_id)) po.po_instance_id = generateLocalId_('PO');
          if (!Array.isArray(po.cnf_entries) || !po.cnf_entries.length) {
            const legacy = {};
            CNF_FIELD_KEYS.forEach(function (key) { legacy[key] = normalizeNaValue_(po[key]); });
            po.cnf_entries = [legacy];
          }
          po.cnf_entries.forEach(function (entry) {
            if (isMissingValue_(entry.cnf_instance_id)) entry.cnf_instance_id = generateLocalId_('CNF');
            CNF_FIELD_KEYS.forEach(function (key) { entry[key] = normalizeNaValue_(entry[key]); });
          });
        });
      });
    });
    return project;
  }

  function renderProjectFormHost() {
    const host = byId('projectFormHost');
    if (host && host.innerHTML) captureHierarchyDisclosureState_();
    const draft = AppState.projectDraft || emptyProjectDraft();
    const title = valueOrNA(draft.project_id) !== 'NA' ? draft.project_id : 'New Project';
    const readOnly = !!draft.read_only;
    host.innerHTML =
      '<div class="panel">' +
        '<div class="panel-header project-sticky-header">' +
          '<div><span class="project-header-label">Project Header</span><h2 id="projectFormTitle">' + escapeHtml(title) + '</h2>' +
          '<p>Project ID · System-generated Project ID</p></div>' +
          '<div class="button-row">' +
            (draft.record_state && draft.record_state !== 'Active' ? '<span class="record-state-badge">' + escapeHtml(draft.record_state) + ' · Read only</span>' : '') +
            (AppState.editingProjectId && !readOnly ? '<button id="deleteProjectButton" class="danger-button button-with-icon">' +
              iconSvg_('archive', 'button-icon') + 'Archive Project</button>' : '') +
            (!readOnly ? '<button id="clearProjectButton" class="secondary-button button-with-icon">' +
              iconSvg_('clear', 'button-icon') + 'Clear</button>' : '') +
            (!readOnly ? '<button id="saveProjectButton" class="primary-button button-with-icon">' +
              iconSvg_('save', 'button-icon') + 'Save Project</button>' : '') +
          '</div>' +
        '</div>' +
        '<div class="inline-form-body">' +
          renderProjectHeaderFields(draft) +
          renderProjectTabs_() +
          '<div id="hierarchyHost" class="tab-layer tab-layer-' + projectTabKey_(AppState.activeProjectTab) + '">' +
            renderHierarchy(draft.batches || [], AppState.activeProjectTab) + '</div>' +
          (AppState.activeProjectTab === 'AM/BM/PL' && !readOnly ? '<div class="inline-actions" style="margin-top:12px">' +
            '<button id="addBatchButton" class="secondary-button button-with-icon">' +
              iconSvg_('add', 'button-icon') + 'Add Batch</button></div>' : '') +
        '</div>' +
      '</div>';

    AppState.projectFormMounted = true;
    if (byId('saveProjectButton')) byId('saveProjectButton').addEventListener('click', function () { saveProjectDraft(false); });
    if (byId('clearProjectButton')) byId('clearProjectButton').addEventListener('click', confirmClearProjectForm_);
    if (byId('deleteProjectButton')) byId('deleteProjectButton').addEventListener('click', confirmDeleteProject);
    if (byId('addBatchButton')) {
      byId('addBatchButton').addEventListener('click', function (event) {
        event.preventDefault();
        syncDraftFromDom(draft);
        const addedBatch = cloneBatchDefaults_(draft.batches[0]);
        draft.batches.push(addedBatch);
        setHierarchyBranchOpen_(addedBatch, false);
        renderProjectFormHost();
        showToast('Batch 1 values copied as editable defaults.', 'success');
      });
    }
    bindProjectTabs_(draft);
    bindHierarchyActions(draft);
    bindProjectHeaderInputs(draft);
    bindHierarchyInputs(draft);
    bindNaControls();
    updateFinalStatusOtherState(draft);
    bindHierarchyDisclosureState_();
    if (readOnly) {
      host.querySelectorAll('input, select, textarea, button[data-add-mo], button[data-add-po], button[data-add-cnf], button[data-remove-batch], button[data-remove-mo], button[data-remove-po], button[data-remove-cnf], button[data-copy-po]').forEach(function (el) {
        el.disabled = true;
      });
    }
  }

  function renderProjectHeaderFields(draft) {
    return '<div class="form-section"><h3>Project Header</h3><div class="form-grid">' +
      HEADER_FIELDS.map(function (field) {
        return renderFieldControl(field, draft[field.key], field.key, field.span);
      }).join('') +
    '</div></div>';
  }

  function renderProjectTabs_() {
    return '<div class="project-tabs" role="tablist">' + PROJECT_TABS.map(function (tab) {
      const duplicateCount = Object.keys(AppState.duplicateHighlights).filter(function (id) {
        return AppState.duplicateHighlights[id].tab === tab;
      }).length;
      return '<button type="button" class="project-tab tab-' + projectTabKey_(tab) +
        (AppState.activeProjectTab === tab ? ' active' : '') +
        '" data-project-tab="' + tab + '" role="tab" aria-selected="' + (AppState.activeProjectTab === tab) + '">' +
        iconSvg_(projectTabKey_(tab), 'tab-icon') + escapeHtml(tab) +
        (duplicateCount ? '<span class="tab-alert-count">' + duplicateCount + '</span>' : '') + '</button>';
    }).join('') + '</div>';
  }

  function bindProjectTabs_(draft) {
    document.querySelectorAll('[data-project-tab]').forEach(function (button) {
      button.addEventListener('click', function () {
        captureHierarchyDisclosureState_();
        syncDraftFromDom(draft);
        AppState.activeProjectTab = button.getAttribute('data-project-tab');
        renderProjectFormHost();
      });
    });
  }

  function projectTabKey_(tab) {
    if (tab === 'AM/BM/PL') return 'am';
    return String(tab || '').toLowerCase();
  }

  function cloneBatchDefaults_(source) {
    if (!source) return emptyBatch();
    const clone = JSON.parse(JSON.stringify(source));
    clone.batch_instance_id = generateLocalId_('BAT');
    (clone.mo_controls || []).forEach(function (mo) {
      mo.mo_instance_id = generateLocalId_('MO');
      (mo.po_controls || []).forEach(function (po) {
        delete po.record_id;
        po.po_instance_id = generateLocalId_('PO');
        (po.cnf_entries || []).forEach(function (entry) {
          entry.cnf_instance_id = generateLocalId_('CNF');
        });
      });
    });
    return normalizeLoadedProject_({ batches: [clone] }).batches[0];
  }

  function setHierarchyBranchOpen_(batch, open) {
    AppState.hierarchyOpen['batch:' + batch.batch_instance_id] = open;
    (batch.mo_controls || []).forEach(function (mo) {
      AppState.hierarchyOpen['mo:' + mo.mo_instance_id] = open;
      (mo.po_controls || []).forEach(function (po) {
        AppState.hierarchyOpen['po:' + po.po_instance_id] = open;
        (po.cnf_entries || []).forEach(function (entry) {
          if (!entry.cnf_instance_id) entry.cnf_instance_id = generateLocalId_('CNF');
          AppState.hierarchyOpen['cnf:' + entry.cnf_instance_id] = open;
        });
      });
    });
  }

  function renderHierarchy(batches, activeTab) {
    return batches.map(function (batch, batchIndex) {
      const batchLabel = displaySummaryValue(batch.unique_batch, 'Batch ' + (batchIndex + 1));
      const detailKey = 'batch:' + batch.batch_instance_id;
      return '<details class="hierarchy-block hierarchy-batch"' + detailOpenAttr_(detailKey, true) +
        ' data-detail-key="' + escapeHtml(detailKey) + '" data-batch-index="' + batchIndex + '">' +
        '<summary><span class="hierarchy-summary" id="batchSummary_' + batchIndex + '">Batch ' + (batchIndex + 1) + ': ' + escapeHtml(batchLabel) + '</span>' +
          '<span class="inline-actions">' +
            (activeTab === 'AM/BM/PL' ? '<button type="button" class="chip-button button-with-icon" data-add-mo="' + batchIndex + '">' +
              iconSvg_('add', 'button-icon') + 'MO</button>' +
            '<button type="button" class="chip-button danger button-with-icon" data-remove-batch="' + batchIndex + '">' +
              iconSvg_('remove', 'button-icon') + 'Remove</button>' : '') +
        '</span></summary>' +
        '<div class="hierarchy-body">' +
          (activeTab === 'AM/BM/PL' ? '<div class="hierarchy-key-field">' +
            renderFieldControl(BATCH_FIELDS[0], batch.unique_batch, 'batch_' + batchIndex) + '</div>' : '') +
          (batch.mo_controls || []).map(function (mo, moIndex) {
            return renderMoBlock(batch, batchIndex, mo, moIndex, activeTab);
          }).join('') +
        '</div></details>';
    }).join('');
  }

  function renderMoBlock(batch, batchIndex, mo, moIndex, activeTab) {
    const moLabel = displaySummaryValue(mo.mo_control_no, 'MO ' + (moIndex + 1));
    const detailKey = 'mo:' + mo.mo_instance_id;
    return '<details class="hierarchy-block hierarchy-mo"' + detailOpenAttr_(detailKey, true) +
      ' data-detail-key="' + escapeHtml(detailKey) + '" data-batch-index="' + batchIndex + '" data-mo-index="' + moIndex + '">' +
      '<summary><span class="hierarchy-summary" id="moSummary_' + batchIndex + '_' + moIndex + '">MO ' + (moIndex + 1) + ': ' + escapeHtml(moLabel) + '</span>' +
        '<span class="inline-actions">' +
          (activeTab === 'AM/BM/PL' ? '<button type="button" class="chip-button button-with-icon" data-add-po="' + batchIndex + '-' + moIndex + '">' +
            iconSvg_('add', 'button-icon') + 'PO</button>' +
          '<button type="button" class="chip-button danger button-with-icon" data-remove-mo="' + batchIndex + '-' + moIndex + '">' +
            iconSvg_('remove', 'button-icon') + 'Remove</button>' : '') +
          '</span></summary>' +
      '<div class="hierarchy-body">' +
        (activeTab === 'AM/BM/PL' ? '<div class="hierarchy-key-field">' +
          renderFieldControl(MO_FIELDS[0], mo.mo_control_no, 'mo_' + batchIndex + '_' + moIndex) + '</div>' : '') +
        (mo.po_controls || []).map(function (po, poIndex) {
          return renderPoBlock(batchIndex, moIndex, po, poIndex, activeTab);
        }).join('') +
      '</div></details>';
  }

  function renderPoBlock(batchIndex, moIndex, po, poIndex, activeTab) {
    const poLabel = displaySummaryValue(po.po_control_no, 'PO ' + (poIndex + 1));
    const fields = PO_FIELDS.filter(function (field) {
      if (CNF_FIELD_KEYS.indexOf(field.key) !== -1) return false;
      return field.role === activeTab;
    });
    const detailKey = 'po:' + po.po_instance_id;
    return '<details class="hierarchy-block hierarchy-po"' + detailOpenAttr_(detailKey, true) +
      ' data-detail-key="' + escapeHtml(detailKey) + '" data-batch-index="' + batchIndex + '" data-mo-index="' + moIndex + '" data-po-index="' + poIndex + '">' +
      '<summary><span class="hierarchy-summary" id="poSummary_' + batchIndex + '_' + moIndex + '_' + poIndex + '">' + escapeHtml(poLabel) + '</span>' +
        '<span class="inline-actions">' +
          (activeTab === 'AM/BM/PL' && poIndex > 0 ? '<button type="button" class="chip-button" data-copy-po="' + batchIndex + '-' + moIndex + '-' + poIndex + '">Copy from 1st PO</button>' : '') +
          (activeTab === 'AM/BM/PL' ? '<button type="button" class="chip-button danger button-with-icon" data-remove-po="' + batchIndex + '-' + moIndex + '-' + poIndex + '">' +
            iconSvg_('remove', 'button-icon') + 'Remove</button>' : '') +
        '</span></summary>' +
      '<div class="hierarchy-body"><div class="form-grid">' +
        fields.map(function (field) {
          const id = 'po_' + batchIndex + '_' + moIndex + '_' + poIndex + '_' + field.key;
          return renderFieldControl(field, po[field.key], id, field.span, 'data-po-field="' + field.key + '"');
        }).join('') + '</div>' +
        (activeTab === 'AM/BM/PL' ? renderCnfEntries_(po, batchIndex, moIndex, poIndex) : '') +
      '</div></details>';
  }

  function renderCnfEntries_(po, batchIndex, moIndex, poIndex) {
    const entries = po.cnf_entries || [emptyCnfEntry_()];
    return '<div class="cnf-entry-list"><div class="cnf-entry-heading"><h4>CNF Entries</h4>' +
      '<button type="button" class="chip-button button-with-icon" data-add-cnf="' + batchIndex + '-' + moIndex + '-' + poIndex + '">' +
        iconSvg_('add', 'button-icon') + 'CNF Entry</button></div>' +
      entries.map(function (entry, cnfIndex) {
        if (!entry.cnf_instance_id) entry.cnf_instance_id = generateLocalId_('CNF');
        const detailKey = 'cnf:' + entry.cnf_instance_id;
        return '<details class="cnf-entry-card"' + detailOpenAttr_(detailKey, cnfIndex === 0) +
          ' data-detail-key="' + escapeHtml(detailKey) + '"><summary class="cnf-entry-heading"><strong>CNF Entry ' + (cnfIndex + 1) + '</strong>' +
          (entries.length > 1 ? '<button type="button" class="chip-button danger button-with-icon" data-remove-cnf="' +
            batchIndex + '-' + moIndex + '-' + poIndex + '-' + cnfIndex + '">' +
            iconSvg_('remove', 'button-icon') + 'Remove</button>' : '') + '</summary>' +
          '<div class="cnf-entry-body"><div class="form-grid">' + PO_FIELDS.filter(function (field) {
            return CNF_FIELD_KEYS.indexOf(field.key) !== -1;
          }).map(function (field) {
            const id = 'cnf_' + batchIndex + '_' + moIndex + '_' + poIndex + '_' + cnfIndex + '_' + field.key;
            return renderFieldControl(field, entry[field.key], id, field.span, 'data-cnf-field="' + field.key + '"');
          }).join('') + '</div></div></details>';
      }).join('') + '</div>';
  }

  function detailOpenAttr_(key, defaultOpen) {
    if (!Object.prototype.hasOwnProperty.call(AppState.hierarchyOpen, key)) {
      AppState.hierarchyOpen[key] = !!defaultOpen;
    }
    return AppState.hierarchyOpen[key] ? ' open' : '';
  }

  function bindHierarchyDisclosureState_() {
    document.querySelectorAll('#projectFormHost details[data-detail-key]').forEach(function (node) {
      node.addEventListener('toggle', function () {
        AppState.hierarchyOpen[node.getAttribute('data-detail-key')] = node.open;
      });
    });
  }

  function captureHierarchyDisclosureState_() {
    document.querySelectorAll('#projectFormHost details[data-detail-key]').forEach(function (node) {
      AppState.hierarchyOpen[node.getAttribute('data-detail-key')] = node.open;
    });
  }

  function renderFieldControl(field, value, id, span, extraAttrs) {
    const normalized = isMissingValue_(value) ? NA_VALUE : value;
    const naClass = isMissingValue_(value) ? ' na-guide' : '';
    const labelHtml = '<label for="' + id + '">' + escapeHtml(field.label) +
      (field.role ? '<span class="field-role">' + escapeHtml(field.role) + '</span>' : '') +
      (field.tooltip ? '<span class="field-hint">' + escapeHtml(field.tooltip) + '</span>' : '') +
      '</label>';
    const spanClass = (span > 1 ? ' span-' + span : '') + (AppState.duplicateHighlights[id] ? ' duplicate-highlight' : '');
    if (field.type === 'readonly') {
      return '<div class="field' + spanClass + '">' + labelHtml +
        '<input id="' + id + '" type="text" value="' + escapeHtml(value || '') + '" readonly></div>';
    }
    if (field.type === 'textarea') {
      return '<div class="field' + spanClass + '">' + labelHtml +
        '<textarea id="' + id + '" class="' + naClass.trim() + '" data-na-control="true" ' + (extraAttrs || '') + '>' + escapeHtml(normalized) + '</textarea></div>';
    }
    if (field.type === 'select') {
      return '<div class="field' + spanClass + '">' + labelHtml +
        renderSelectElement(id, normalized, AppState.registry[field.registry] || VAL_BATCH_OPTIONS, extraAttrs, naClass) + '</div>';
    }
    if (field.type === 'date') {
      return '<div class="field' + spanClass + '">' + labelHtml +
        renderAdaptiveDateControl_(id, value, 'date', extraAttrs, naClass) + '</div>';
    }
    if (field.type === 'month') {
      return '<div class="field' + spanClass + '">' + labelHtml +
        renderAdaptiveDateControl_(id, value, 'month', extraAttrs, naClass) + '</div>';
    }
    const inputType = field.type === 'numeric' ? 'text' : 'text';
    const inputMode = field.type === 'numeric' ? ' inputmode="numeric" pattern="[0-9]*"' : '';
    const alphaPattern = field.type === 'alphanumeric' ? ' pattern="[A-Za-z0-9\\-_/ ]*"' : '';
    return '<div class="field' + spanClass + '">' + labelHtml +
      '<input id="' + id + '" type="' + inputType + '" class="' + naClass.trim() + '" data-na-control="true" value="' + escapeHtml(normalized) + '"' + inputMode + alphaPattern +
      ' ' + (extraAttrs || '') + '></div>';
  }

  function renderSelectElement(id, value, options, extraAttrs, className) {
    const opts = [{ value: NA_VALUE, label: NA_VALUE }].concat((options || []).filter(function (option) {
      return option !== NA_VALUE;
    }).map(function (option) {
      return { value: option, label: option };
    }));
    return '<select id="' + id + '" class="' + String(className || '').trim() + '" data-na-control="true" ' + (extraAttrs || '') + '>' + opts.map(function (option) {
      return '<option value="' + escapeHtml(option.value) + '"' + (String(value) === String(option.value) ? ' selected' : '') + '>' +
        escapeHtml(option.label) + '</option>';
    }).join('') + '</select>';
  }

  function renderAdaptiveDateControl_(id, value, dateType, extraAttrs, className) {
    if (isMissingValue_(value)) {
      return '<input id="' + id + '" type="text" class="' + String(className || '').trim() + '" data-na-control="true" data-na-date-type="' + dateType + '" value="' + NA_VALUE + '" ' + (extraAttrs || '') + '>';
    }
    const inputValue = dateType === 'month' ? toInputMonth(value) : toInputDate(value);
    return '<input id="' + id + '" type="' + dateType + '" data-na-control="true" data-na-date-type="' + dateType + '" value="' + escapeHtml(inputValue) + '" ' + (extraAttrs || '') + '>';
  }

  function bindNaControls() {
    document.querySelectorAll('#projectFormHost [data-na-control="true"]').forEach(function (el) {
      const dateType = el.getAttribute('data-na-date-type');
      el.addEventListener('focus', function () {
        if (dateType && el.type === 'text' && isMissingValue_(el.value)) {
          el.type = dateType;
          el.value = '';
          if (typeof el.showPicker === 'function') window.setTimeout(function () { el.showPicker(); }, 0);
        } else if (!dateType && el.tagName !== 'SELECT' && isMissingValue_(el.value)) {
          el.value = '';
        }
        el.classList.remove('na-guide');
      });
      el.addEventListener('blur', function () {
        if (!String(el.value || '').trim()) {
          if (dateType) el.type = 'text';
          el.value = NA_VALUE;
          el.classList.add('na-guide');
          el.dispatchEvent(new Event('change', { bubbles: true }));
        }
      });
      el.addEventListener('change', function () {
        el.classList.toggle('na-guide', isMissingValue_(el.value));
      });
    });
  }

  function bindProjectHeaderInputs(draft) {
    HEADER_FIELDS.forEach(function (field) {
      if (field.type === 'readonly') return;
      const el = byId(field.key);
      if (!el) return;
      const handler = function () {
        draft[field.key] = el.value;
        if (field.key === 'project_id') updateProjectFormTitle(draft.project_id);
      };
      el.addEventListener('input', handler);
      el.addEventListener('change', handler);
    });
  }

  function bindHierarchyInputs(draft) {
    draft.batches.forEach(function (batch, batchIndex) {
      bindSummaryInput('batch_' + batchIndex, function (value) {
        batch.unique_batch = value;
        setText('batchSummary_' + batchIndex, 'Batch ' + (batchIndex + 1) + ': ' + displaySummaryValue(value, 'Batch ' + (batchIndex + 1)));
      });
      batch.mo_controls.forEach(function (mo, moIndex) {
        bindSummaryInput('mo_' + batchIndex + '_' + moIndex, function (value) {
          mo.mo_control_no = value;
          setText('moSummary_' + batchIndex + '_' + moIndex, 'MO ' + (moIndex + 1) + ': ' + displaySummaryValue(value, 'MO ' + (moIndex + 1)));
        });
        mo.po_controls.forEach(function (po, poIndex) {
          PO_FIELDS.forEach(function (field) {
            const el = byId('po_' + batchIndex + '_' + moIndex + '_' + poIndex + '_' + field.key);
            if (!el) return;
            const handler = function () {
              po[field.key] = el.value;
              if (field.key === 'final_status') {
                updateFinalStatusOtherState(draft);
              }
              if (field.key === 'po_control_no') {
                setText('poSummary_' + batchIndex + '_' + moIndex + '_' + poIndex, displaySummaryValue(el.value, 'PO ' + (poIndex + 1)));
              }
            };
            el.addEventListener('input', handler);
            el.addEventListener('change', handler);
          });
          (po.cnf_entries || []).forEach(function (entry, cnfIndex) {
            CNF_FIELD_KEYS.forEach(function (key) {
              const el = byId('cnf_' + batchIndex + '_' + moIndex + '_' + poIndex + '_' + cnfIndex + '_' + key);
              if (!el) return;
              const handler = function () { entry[key] = el.value; };
              el.addEventListener('input', handler);
              el.addEventListener('change', handler);
            });
          });
        });
      });
    });
  }

  function bindSummaryInput(id, onChange) {
    const el = byId(id);
    if (!el) return;
    el.addEventListener('input', function () { onChange(el.value); });
    el.addEventListener('change', function () { onChange(el.value); });
  }

  function updateProjectFormTitle(value) {
    const title = valueOrNA(value) !== 'NA' ? value : 'New Project';
    const node = byId('projectFormTitle');
    if (node) node.textContent = title;
  }

  function displaySummaryValue(value, fallback) {
    return !isMissingValue_(value) ? String(value).trim() : fallback;
  }

  function updateFinalStatusOtherState(draft) {
    (draft.batches || []).forEach(function (batch, batchIndex) {
      (batch.mo_controls || []).forEach(function (mo, moIndex) {
        (mo.po_controls || []).forEach(function (po, poIndex) {
          const statusId = 'po_' + batchIndex + '_' + moIndex + '_' + poIndex + '_final_status';
          const otherId = 'po_' + batchIndex + '_' + moIndex + '_' + poIndex + '_final_status_other';
          const status = byId(statusId);
          const other = byId(otherId);
          if (!status || !other) return;
          const enabled = status.value === 'Others' || status.value === 'CANCELLED';
          other.disabled = !enabled;
          other.closest('.field').classList.toggle('field-disabled', !enabled);
          if (!enabled) {
            other.value = NA_VALUE;
            other.classList.add('na-guide');
            po.final_status_other = NA_VALUE;
          }
        });
      });
    });
  }

  function setAllHierarchyDetails(open) {
    document.querySelectorAll('#projectFormHost details').forEach(function (node) {
      node.open = open;
    });
  }

  function bindHierarchyActions(draft) {
    document.querySelectorAll('[data-add-mo]').forEach(function (button) {
      button.addEventListener('click', function (event) {
        event.preventDefault();
        event.stopPropagation();
        syncDraftFromDom(draft);
        const addedMo = emptyMo();
        draft.batches[Number(button.getAttribute('data-add-mo'))].mo_controls.push(addedMo);
        AppState.hierarchyOpen['mo:' + addedMo.mo_instance_id] = false;
        AppState.hierarchyOpen['po:' + addedMo.po_controls[0].po_instance_id] = false;
        renderProjectFormHost();
      });
    });
    document.querySelectorAll('[data-add-po]').forEach(function (button) {
      button.addEventListener('click', function (event) {
        event.preventDefault();
        event.stopPropagation();
        const parts = button.getAttribute('data-add-po').split('-');
        syncDraftFromDom(draft);
        const addedPo = emptyPo();
        draft.batches[Number(parts[0])].mo_controls[Number(parts[1])].po_controls.push(addedPo);
        AppState.hierarchyOpen['po:' + addedPo.po_instance_id] = false;
        renderProjectFormHost();
      });
    });
    document.querySelectorAll('[data-remove-batch]').forEach(function (button) {
      button.addEventListener('click', function (event) {
        event.preventDefault();
        event.stopPropagation();
        if (draft.batches.length <= 1) return showToast('At least one batch is required.', 'warning');
        confirmRemove_('Remove this batch and all nested MO/PO lines?', function () {
          syncDraftFromDom(draft);
          draft.batches.splice(Number(button.getAttribute('data-remove-batch')), 1);
          renderProjectFormHost();
        });
      });
    });
    document.querySelectorAll('[data-remove-mo]').forEach(function (button) {
      button.addEventListener('click', function (event) {
        event.preventDefault();
        event.stopPropagation();
        const parts = button.getAttribute('data-remove-mo').split('-');
        const batch = draft.batches[Number(parts[0])];
        if (batch.mo_controls.length <= 1) return showToast('At least one MO is required.', 'warning');
        confirmRemove_('Remove this MO and all nested PO lines?', function () {
          syncDraftFromDom(draft);
          batch.mo_controls.splice(Number(parts[1]), 1);
          renderProjectFormHost();
        });
      });
    });
    document.querySelectorAll('[data-remove-po]').forEach(function (button) {
      button.addEventListener('click', function (event) {
        event.preventDefault();
        event.stopPropagation();
        const parts = button.getAttribute('data-remove-po').split('-');
        const mo = draft.batches[Number(parts[0])].mo_controls[Number(parts[1])];
        if (mo.po_controls.length <= 1) return showToast('At least one PO is required.', 'warning');
        confirmRemove_('Remove this PO line?', function () {
          syncDraftFromDom(draft);
          mo.po_controls.splice(Number(parts[2]), 1);
          renderProjectFormHost();
        });
      });
    });
    document.querySelectorAll('[data-copy-po]').forEach(function (button) {
      button.addEventListener('click', function (event) {
        event.preventDefault();
        event.stopPropagation();
        const parts = button.getAttribute('data-copy-po').split('-');
        syncDraftFromDom(draft);
        const po = draft.batches[Number(parts[0])].mo_controls[Number(parts[1])].po_controls[Number(parts[2])];
        const first = getFirstPoFromDraft();
        ['protocol_no', 'protocol_Status', 'protocol_target_date', 'Val_Strategy'].forEach(function (key) {
          po[key] = first[key] || '';
        });
        po.cnf_entries = JSON.parse(JSON.stringify(first.cnf_entries || [emptyCnfEntry_()]));
        po.cnf_entries.forEach(function (entry) {
          entry.cnf_instance_id = generateLocalId_('CNF');
        });
        renderProjectFormHost();
        showToast('Copied CNF/protocol/strategy fields from first PO.', 'success');
      });
    });
    document.querySelectorAll('[data-add-cnf]').forEach(function (button) {
      button.addEventListener('click', function (event) {
        event.preventDefault();
        event.stopPropagation();
        const parts = button.getAttribute('data-add-cnf').split('-').map(Number);
        syncDraftFromDom(draft);
        const addedCnf = emptyCnfEntry_();
        draft.batches[parts[0]].mo_controls[parts[1]].po_controls[parts[2]].cnf_entries.push(addedCnf);
        AppState.hierarchyOpen['cnf:' + addedCnf.cnf_instance_id] = false;
        renderProjectFormHost();
      });
    });
    document.querySelectorAll('[data-remove-cnf]').forEach(function (button) {
      button.addEventListener('click', function (event) {
        event.preventDefault();
        event.stopPropagation();
        const parts = button.getAttribute('data-remove-cnf').split('-').map(Number);
        const po = draft.batches[parts[0]].mo_controls[parts[1]].po_controls[parts[2]];
        confirmRemove_('Remove CNF Entry ' + (parts[3] + 1) + ' from this PO?', function () {
          syncDraftFromDom(draft);
          po.cnf_entries.splice(parts[3], 1);
          renderProjectFormHost();
        });
      });
    });
  }

  function confirmRemove_(message, onConfirm) {
    openConfirmModal(message, onConfirm);
  }

  function syncDraftFromDom(draft) {
    HEADER_FIELDS.forEach(function (field) {
      const el = byId(field.key);
      if (el && field.type !== 'readonly') draft[field.key] = el.value;
    });
    draft.batches.forEach(function (batch, batchIndex) {
      const batchInput = byId('batch_' + batchIndex);
      if (batchInput) batch.unique_batch = batchInput.value;
      batch.mo_controls.forEach(function (mo, moIndex) {
        const moInput = byId('mo_' + batchIndex + '_' + moIndex);
        if (moInput) mo.mo_control_no = moInput.value;
        mo.po_controls.forEach(function (po, poIndex) {
          PO_FIELDS.forEach(function (field) {
            const el = byId('po_' + batchIndex + '_' + moIndex + '_' + poIndex + '_' + field.key);
            if (el) po[field.key] = el.value;
          });
          (po.cnf_entries || []).forEach(function (entry, cnfIndex) {
            CNF_FIELD_KEYS.forEach(function (key) {
              const el = byId('cnf_' + batchIndex + '_' + moIndex + '_' + poIndex + '_' + cnfIndex + '_' + key);
              if (el) entry[key] = el.value;
            });
          });
        });
      });
    });
  }

  function getFirstPoFromDraft() {
    const draft = AppState.projectDraft;
    if (!draft || !draft.batches || !draft.batches.length) return emptyPo();
    const batch = draft.batches[0];
    if (!batch.mo_controls || !batch.mo_controls.length) return emptyPo();
    const mo = batch.mo_controls[0];
    if (!mo.po_controls || !mo.po_controls.length) return emptyPo();
    return mo.po_controls[0];
  }

  function saveProjectDraft(skipDuplicateReview) {
    const draft = AppState.projectDraft;
    if (!draft || typeof draft !== 'object') {
      showToast('No project form data is available to save. Open or create a project first.', 'error');
      return;
    }
    syncDraftFromDom(draft);
    normalizeProjectDraft_(draft);
    if (!skipDuplicateReview) {
      const duplicates = detectDuplicateValues_(draft);
      if (duplicates.length) {
        openDuplicateReview_(duplicates);
        return;
      }
    }
    AppState.duplicateHighlights = {};
    performProjectSave_(draft);
  }

  function performProjectSave_(draft) {
    const handler = AppState.editingProjectId ? 'updateProject' : 'saveProject';
    const args = AppState.editingProjectId ? [AppState.editingProjectId, draft] : [draft];
    runServer(handler, args, function () {
      showToast('Project saved successfully.', 'success');
      syncDataAfterWrite_();
      clearProjectForm();
    });
  }

  function normalizeProjectDraft_(draft) {
    HEADER_FIELDS.forEach(function (field) {
      if (field.key !== 'project_id') draft[field.key] = normalizeNaValue_(draft[field.key]);
    });
    (draft.batches || []).forEach(function (batch) {
      batch.unique_batch = normalizeNaValue_(batch.unique_batch);
      (batch.mo_controls || []).forEach(function (mo) {
        mo.mo_control_no = normalizeNaValue_(mo.mo_control_no);
        (mo.po_controls || []).forEach(function (po) {
          PO_FIELDS.forEach(function (field) {
            if (CNF_FIELD_KEYS.indexOf(field.key) === -1) po[field.key] = normalizeNaValue_(po[field.key]);
          });
          if (!Array.isArray(po.cnf_entries) || !po.cnf_entries.length) po.cnf_entries = [emptyCnfEntry_()];
          po.cnf_entries.forEach(function (entry) {
            CNF_FIELD_KEYS.forEach(function (key) { entry[key] = normalizeNaValue_(entry[key]); });
          });
          const first = po.cnf_entries[0];
          CNF_FIELD_KEYS.forEach(function (key) { po[key] = first[key]; });
        });
      });
    });
  }

  function detectDuplicateValues_(draft) {
    const values = {};
    function collect(field, value, id, location, tab) {
      if (isMissingValue_(value)) return;
      const normalized = String(value).trim().toLowerCase();
      const key = field.key + '::' + normalized;
      if (!values[key]) values[key] = { field: field, value: String(value).trim(), occurrences: [] };
      values[key].occurrences.push({ id: id, location: location, tab: tab });
    }
    (draft.batches || []).forEach(function (batch, bi) {
      collect(BATCH_FIELDS[0], batch.unique_batch, 'batch_' + bi, 'Batch ' + (bi + 1), 'AM/BM/PL');
      (batch.mo_controls || []).forEach(function (mo, mi) {
        const moLocation = 'Batch ' + (bi + 1) + ' / MO ' + (mi + 1);
        collect(MO_FIELDS[0], mo.mo_control_no, 'mo_' + bi + '_' + mi, moLocation, 'AM/BM/PL');
        (mo.po_controls || []).forEach(function (po, pi) {
          const poLocation = moLocation + ' / PO ' + (pi + 1);
          PO_FIELDS.forEach(function (field) {
            if (CNF_FIELD_KEYS.indexOf(field.key) !== -1) return;
            collect(field, po[field.key], 'po_' + bi + '_' + mi + '_' + pi + '_' + field.key, poLocation, field.role);
          });
          (po.cnf_entries || []).forEach(function (entry, ci) {
            CNF_FIELD_KEYS.forEach(function (key) {
              const field = PO_FIELDS.find(function (item) { return item.key === key; });
              collect(field, entry[key], 'cnf_' + bi + '_' + mi + '_' + pi + '_' + ci + '_' + key,
                poLocation + ' / CNF Entry ' + (ci + 1), 'AM/BM/PL');
            });
          });
        });
      });
    });
    return Object.keys(values).map(function (key) { return values[key]; }).filter(function (group) {
      return group.occurrences.length > 1;
    }).sort(function (a, b) {
      return a.field.label.localeCompare(b.field.label) || a.value.localeCompare(b.value);
    });
  }

  function openDuplicateReview_(duplicates) {
    AppState.duplicateHighlights = {};
    duplicates.forEach(function (group) {
      group.occurrences.forEach(function (item) {
        AppState.duplicateHighlights[item.id] = { tab: item.tab, location: item.location };
      });
    });
    renderProjectFormHost();
    const body = '<div class="duplicate-review"><p>Duplicate values were detected. Review each location, then accept and save or return to edit.</p>' +
      duplicates.map(function (group) {
        return '<section><h3>' + escapeHtml(group.field.label) + ': <code>' + escapeHtml(group.value) + '</code></h3><ul>' +
          group.occurrences.map(function (item) {
            return '<li><strong>' + escapeHtml(item.tab) + '</strong><span>' + escapeHtml(item.location) + '</span></li>';
          }).join('') + '</ul></section>';
      }).join('') + '</div>';
    setModal('Duplicate Values Detected', body, [
      { label: 'Go Back and Edit', className: 'secondary-button', action: function () {
        closeModal();
        const first = duplicates[0].occurrences[0];
        AppState.activeProjectTab = first.tab;
        renderProjectFormHost();
        window.setTimeout(function () {
          const el = byId(first.id);
          if (el) {
            el.scrollIntoView({ behavior: 'smooth', block: 'center' });
            el.focus();
          }
        }, 50);
      } },
      { label: 'Accept and Save', className: 'primary-button', action: function () {
        closeModal();
        saveProjectDraft(true);
      } }
    ]);
  }

  function openNaFieldsReport() {
    const draft = AppState.projectDraft || emptyProjectDraft();
    syncDraftFromDom(draft);
    normalizeProjectDraft_(draft);
    const grouped = {};
    Object.keys(OWNER_FIELD_GROUPS).forEach(function (owner) { grouped[owner] = []; });
    function addMissing(owner, key, context) {
      const field = HEADER_FIELDS.concat(BATCH_FIELDS, MO_FIELDS, PO_FIELDS).find(function (item) { return item.key === key; });
      grouped[owner].push({ label: field ? field.label : key, context: context });
    }
    HEADER_FIELDS.forEach(function (field) {
      if (field.key !== 'project_id' && isMissingValue_(draft[field.key])) addMissing('AM/BM/PL', field.key, 'Project Header');
    });
    (draft.batches || []).forEach(function (batch, bi) {
      if (isMissingValue_(batch.unique_batch)) addMissing('AM/BM/PL', 'unique_batch', 'Batch ' + (bi + 1));
      (batch.mo_controls || []).forEach(function (mo, mi) {
        if (isMissingValue_(mo.mo_control_no)) addMissing('AM/BM/PL', 'mo_control_no', 'Batch ' + (bi + 1) + ' / MO ' + (mi + 1));
        (mo.po_controls || []).forEach(function (po, pi) {
          Object.keys(OWNER_FIELD_GROUPS).forEach(function (owner) {
            OWNER_FIELD_GROUPS[owner].forEach(function (key) {
              if (CNF_FIELD_KEYS.indexOf(key) === -1 && PO_FIELDS.some(function (field) { return field.key === key; }) && isMissingValue_(po[key])) {
                addMissing(owner, key, 'Batch ' + (bi + 1) + ' / MO ' + (mi + 1) + ' / PO ' + (pi + 1));
              }
            });
          });
          (po.cnf_entries || []).forEach(function (entry, ci) {
            CNF_FIELD_KEYS.forEach(function (key) {
              if (isMissingValue_(entry[key])) {
                addMissing('CNF', key, 'Batch ' + (bi + 1) + ' / MO ' + (mi + 1) + ' / PO ' + (pi + 1) + ' / CNF Entry ' + (ci + 1));
              }
            });
          });
        });
      });
    });
    const body = '<div class="na-report">' + Object.keys(grouped).map(function (owner) {
      const items = grouped[owner].sort(function (a, b) { return a.label.localeCompare(b.label) || a.context.localeCompare(b.context); });
      return '<section><h3>' + escapeHtml(owner) + ' <span>' + items.length + '</span></h3>' +
        (items.length ? '<ul>' + items.map(function (item) {
          return '<li><strong>' + escapeHtml(item.label) + '</strong><span>' + escapeHtml(item.context) + '</span></li>';
        }).join('') + '</ul>' : '<p>No N/A fields.</p>') + '</section>';
    }).join('') + '</div>';
    setModal('N/A Fields by Owner', body, [{ label: 'Close', className: 'secondary-button', action: closeModal }]);
  }

  function normalizeNaValue_(value) {
    return isMissingValue_(value) ? NA_VALUE : String(value).trim();
  }

  function isMissingValue_(value) {
    const text = String(value === null || value === undefined ? '' : value).trim().toUpperCase();
    return !text || text === 'NA' || text === 'N/A';
  }

  function generateLocalId_(prefix) {
    return prefix + '-' + Date.now().toString(36) + '-' + Math.random().toString(36).slice(2, 10);
  }

  function confirmDeleteProject() {
    if (isMissingValue_(AppState.editingProjectId)) {
      showToast('Cannot archive the project because its Project ID is missing.', 'error');
      return;
    }
    openConfirmModal('Archive this project and all PO lines?', function () {
      runServer('deleteProject', [AppState.editingProjectId], function () {
        showToast('Project archived.', 'success');
        syncDataAfterWrite_();
        clearProjectForm();
      });
    });
  }

  function confirmClearProjectForm_() {
    openConfirmModal(CLEAR_FORM_MESSAGE, function () {
      prepareNewProjectForm(true);
    });
  }

  function openSupportModal(activityId, readOnly) {
    const existing = activityId ? AppState.supportRows.concat(AppState.archivedSupportRows || []).find(function (row) {
      return row.activity_id === activityId;
    }) : null;
    const draft = existing ? Object.assign({}, existing) : emptySupportDraft_();
    const archived = !!readOnly || (existing && !isActiveClientRow_(existing));
    renderSupportModal_(draft, archived);
  }

  function emptySupportDraft_() {
    return {
      activity_kind: 'TSD',
      Department: '',
      Material: '',
      Line: '',
      Bulk: '',
      Machinability_Protocol: '',
      Machinability_Protocol_Status: '',
      Machinability_Report: '',
      Machinability_Report_Status: '',
      Product_User: '',
      Principal: '',
      Product: '',
      Target_Date: '',
      Planning_Schedule: ''
    };
  }

  function renderSupportModal_(draft, archived) {
    setModal(archived ? 'Archived Support Activity' : 'Support Activity', renderSupportForm(draft), archived
      ? [{ label: 'Close', className: 'secondary-button', action: closeModal }]
      : [
        { label: 'Clear', className: 'danger-button', action: function () { confirmClearSupportForm_(draft); } },
        { label: 'Cancel', className: 'secondary-button', action: closeModal },
        { label: 'Save', className: 'primary-button', action: function () { saveSupportDraft(draft); } }
      ]);
    byId('supportKind').addEventListener('change', function () {
      if (archived) return;
      draft.activity_kind = byId('supportKind').value;
      setHtml('modalBody', renderSupportForm(draft));
      bindSupportForm(draft);
      rebindModalSave(function () { saveSupportDraft(draft); });
    });
    bindSupportForm(draft);
    if (archived) {
      byId('modalBody').querySelectorAll('input, select, textarea').forEach(function (element) {
        element.disabled = true;
      });
    }
  }

  function confirmClearSupportForm_(draft) {
    openConfirmModal(CLEAR_FORM_MESSAGE, function () {
      renderSupportModal_(emptySupportDraft_(), false);
      showToast('Support Activity form cleared.', 'success');
    }, function () {
      renderSupportModal_(draft, false);
    });
  }

  function renderSupportForm(draft) {
    const isTsd = draft.activity_kind !== 'RnD';
    return '<div class="form-grid">' +
      fieldSelect('supportKind', 'Activity Kind', draft.activity_kind, ['TSD', 'RnD']) +
      (draft.project_id
        ? fieldInput('supportProjectId', 'Project ID (System-generated)', draft.project_id, 'readonly')
        : fieldInput('supportProjectId', 'Project ID (System-generated)', 'Assigned automatically when saved', true)) +
      fieldSelect('supportDepartment', 'Department', draft.Department, AppState.registry.department) +
      (isTsd ?
        fieldInput('supportMaterial', 'Material', draft.Material) +
        fieldInput('supportLine', 'Line', draft.Line) +
        fieldInput('supportBulk', 'Bulk', draft.Bulk) +
        fieldInput('supportMachProtocol', 'Machinability Protocol', draft.Machinability_Protocol) +
        fieldSelect('supportMachProtocolStatus', 'Machinability Protocol Status', draft.Machinability_Protocol_Status, AppState.registry.doc_status) +
        fieldInput('supportMachReport', 'Machinability Report', draft.Machinability_Report) +
        fieldSelect('supportMachReportStatus', 'Machinability Report Status', draft.Machinability_Report_Status, AppState.registry.doc_status) +
        fieldInput('supportProductUser', 'Product User', draft.Product_User)
        :
        fieldInput('supportPrincipal', 'Principal', draft.Principal) +
        fieldInput('supportProduct', 'Product', draft.Product) +
        fieldInput('supportLine', 'Line', draft.Line)
      ) +
      fieldDate('supportTargetDate', 'Target Date', draft.Target_Date) +
      fieldDate('supportPlanningSchedule', 'Planning Schedule', draft.Planning_Schedule) +
    '</div>';
  }

  function bindSupportForm(draft) {
    const map = {
      supportKind: 'activity_kind',
      supportDepartment: 'Department',
      supportMaterial: 'Material',
      supportLine: 'Line',
      supportBulk: 'Bulk',
      supportMachProtocol: 'Machinability_Protocol',
      supportMachProtocolStatus: 'Machinability_Protocol_Status',
      supportMachReport: 'Machinability_Report',
      supportMachReportStatus: 'Machinability_Report_Status',
      supportProductUser: 'Product_User',
      supportPrincipal: 'Principal',
      supportProduct: 'Product',
      supportTargetDate: 'Target_Date',
      supportPlanningSchedule: 'Planning_Schedule'
    };
    Object.keys(map).forEach(function (id) {
      const el = byId(id);
      if (!el) return;
      el.addEventListener('input', function () { draft[map[id]] = el.value; });
      el.addEventListener('change', function () { draft[map[id]] = el.value; });
    });
  }

  function saveSupportDraft(draft) {
    if (!draft || typeof draft !== 'object') {
      showToast('No support activity data is available to save.', 'error');
      return;
    }
    if (draft.activity_id) {
      runServer('saveSupportActivity', [draft], function () {
        closeModal();
        showToast('Support activity updated.', 'success');
        syncDataAfterWrite_();
        loadSupportActivities(true);
      });
      return;
    }
    runServer('saveSupportActivity', [draft], function () {
      closeModal();
      showToast('Support activity created.', 'success');
      syncDataAfterWrite_();
      loadSupportActivities(true);
    });
  }

  function confirmArchiveSupport(activityId) {
    if (isMissingValue_(activityId)) {
      showToast('Cannot archive the support activity because its Activity ID is missing.', 'error');
      return;
    }
    openConfirmModal('Archive this support activity?', function () {
      runServer('deleteSupportActivity', [activityId], function () {
        showToast('Support activity archived.', 'success');
        syncDataAfterWrite_();
        loadSupportActivities(true);
      });
    });
  }

  function addRegistryValue() {
    const type = getInputValue('registryTypeFilter');
    const value = getInputValue('registryValueInput');
    if (!type) return showToast('Select a registry type first.', 'warning');
    if (!value.trim()) return showToast('Enter a registry value.', 'warning');
    runServer('saveRegistryValue', [{ type: type, value: value.trim() }], function () {
      byId('registryValueInput').value = '';
      showToast('Registry value added.', 'success');
      syncDataAfterWrite_({ registry: true });
    });
  }

  function openAdminMessageModal() {
    const body =
      '<div class="admin-message-form">' +
        fieldSelect('adminMessageCategory', 'Message Type', 'Suggestion', ['Suggestion', 'Bug Report', 'Improvement Request', 'General Comment']) +
        fieldInput('adminMessageSubject', 'Subject', '') +
        '<div class="field"><label for="adminMessageBody">Message</label>' +
          '<textarea id="adminMessageBody" rows="7" placeholder="Describe your comment, suggestion, or issue clearly."></textarea></div>' +
        '<p class="field-helper">Your signed-in account and submission time will be recorded automatically.</p>' +
      '</div>';
    setModal('Message to Admin', body, [
      { label: 'Cancel', className: 'secondary-button', action: closeModal },
      { label: 'Send Message', className: 'primary-button', action: submitAdminMessage_ }
    ]);
  }

  function submitAdminMessage_() {
    const payload = {
      category: getInputValue('adminMessageCategory'),
      subject: getInputValue('adminMessageSubject').trim(),
      message: getInputValue('adminMessageBody').trim()
    };
    if (!payload.subject) return showToast('Enter a subject for your message.', 'warning');
    if (!payload.message) return showToast('Enter your message before sending.', 'warning');
    runServer('submitAdminMessage', [payload], function () {
      closeModal();
      showToast('Your message was sent to the admin.', 'success');
    });
  }

  function openNotificationsModal() {
    const items = AppState.notifications || [];
    const body = items.length ? '<div class="notification-list">' + items.map(function (item) {
      return '<div class="notification-item ' + escapeHtml(item.severity || 'medium') + '">' +
        '<strong>' + escapeHtml(item.title || 'Alert') + '</strong>' +
        '<p>' + escapeHtml(item.message || '') + '</p>' +
        '<span class="field-helper">' + projectLinkHtml_(item.project_id) + ' &middot; FG ' + escapeHtml(formatDateDisplay(item.fg_month)) + '</span>' +
      '</div>';
    }).join('') + '</div>' : '<div class="empty-state">No open notifications.</div>';
    setModal('FG Month Notifications', body, [{ label: 'Close', className: 'secondary-button', action: closeModal }]);
    bindProjectLinks_(byId('modalBody'));
  }

  function openConfirmModal(message, onConfirm, onCancel) {
    setModal('Confirm Action', '<p class="confirm-message">' + escapeHtml(message) + '</p>', [
      { label: 'Cancel', className: 'secondary-button', action: function () {
        closeModal();
        if (onCancel) onCancel();
      } },
      { label: 'Confirm', className: 'primary-button', action: function () { closeModal(); onConfirm(); } }
    ]);
  }

  function setModal(title, bodyHtml, actions) {
    setText('modalTitle', title);
    setHtml('modalBody', bodyHtml);
    const footer = byId('modalFooter');
    footer.innerHTML = (actions || []).map(function (action, index) {
      return '<button class="' + action.className + '" data-modal-action="' + index + '">' + escapeHtml(action.label) + '</button>';
    }).join('');
    footer.querySelectorAll('[data-modal-action]').forEach(function (button) {
      const index = Number(button.getAttribute('data-modal-action'));
      button.addEventListener('click', actions[index].action);
    });
    byId('modalBackdrop').classList.remove('hidden');
  }

  function rebindModalSave(action) {
    const saveButton = byId('modalFooter').querySelector('.primary-button');
    if (!saveButton) return;
    saveButton.onclick = action;
  }

  function closeModal() {
    byId('modalBackdrop').classList.add('hidden');
    setHtml('modalBody', '');
    setHtml('modalFooter', '');
  }

  function runServer(fnName, args, onSuccess, options) {
    const opts = options || {};
    if (!opts.silent) startLoading();
    const runner = google.script.run
      .withSuccessHandler(function (result) {
        if (!opts.silent) stopLoading(false);
        if (onSuccess) onSuccess(result);
      })
      .withFailureHandler(function (error) {
        if (!opts.silent) stopLoading(true);
        if (opts.onFailure) opts.onFailure(error);
        else showToast(getErrorMessage(error, fnName), 'error');
      });
    try {
      if (!runner || typeof runner[fnName] !== 'function') {
        throw new Error('Google Apps Script function "' + fnName + '" is not available in this deployment.');
      }
      runner[fnName].apply(runner, args || []);
    } catch (error) {
      if (!opts.silent) stopLoading(true);
      if (opts.onFailure) opts.onFailure(error);
      else showToast(getErrorMessage(error, fnName), 'error');
    }
  }

  function startLoading() {
    if (AppState.loadingCount === 0) AppState.loadingError = false;
    AppState.loadingCount += 1;
    setProcessingState_('processing', 'System processing');
  }

  function stopLoading(hasError) {
    if (hasError) {
      AppState.loadingError = true;
      setProcessingState_('error', 'Backend error');
    }
    AppState.loadingCount = Math.max(0, AppState.loadingCount - 1);
    if (AppState.loadingCount === 0) {
      setProcessingState_(AppState.loadingError ? 'error' : 'idle',
        AppState.loadingError ? 'Backend error' : 'System idle');
    }
  }

  function setProcessingState_(state, label) {
    const indicator = byId('processingIndicator');
    if (!indicator) return;
    indicator.className = 'processing-indicator ' + state;
    indicator.setAttribute('aria-label', label);
    indicator.setAttribute('aria-busy', state === 'processing' ? 'true' : 'false');
    indicator.title = label;
  }

  function buildTable(columns, rows, rowRenderer, extraHeader) {
    return '<table><thead><tr>' +
      columns.map(function (col) { return '<th>' + escapeHtml(col.label) + '</th>'; }).join('') +
      (extraHeader ? '<th>' + escapeHtml(extraHeader) + '</th>' : '') +
      '</tr></thead><tbody>' +
      rows.map(rowRenderer).join('') +
      '</tbody></table>';
  }

  function iconSvg_(name, className) {
    const paths = {
      am: '<path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M19 8v6M16 11h6"/>',
      pp: '<path d="M3 21h18M5 21V9l7-4v16M12 21V11l7-3v13"/><path d="M8 13h1M8 17h1M15 13h1M15 17h1"/>',
      tsd: '<path d="M14.7 6.3a4 4 0 0 0-5-5L7.4 3.6l3 3 2.3-2.3a4 4 0 0 0 2 2z"/><path d="m9.4 8.6-7 7a2.1 2.1 0 0 0 3 3l7-7"/>',
      val: '<path d="M9 3h6M10 3v5l-5 9a2 2 0 0 0 1.7 3h10.6A2 2 0 0 0 19 17l-5-9V3"/><path d="M8 14h8"/>',
      qc: '<circle cx="11" cy="11" r="7"/><path d="m16 16 5 5M8 11l2 2 4-4"/>',
      save: '<path d="M5 3h12l2 2v16H5zM8 3v6h8V3M8 21v-7h8v7"/>',
      add: '<path d="M12 5v14M5 12h14"/>',
      remove: '<path d="M5 12h14"/><circle cx="12" cy="12" r="9"/>',
      edit: '<path d="m4 20 4.5-1 10-10-3.5-3.5-10 10zM13.5 7l3.5 3.5"/>',
      archive: '<rect x="3" y="4" width="18" height="5" rx="1"/><path d="M5 9v10a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V9M10 13h4"/>',
      clear: '<path d="m3 17 9-12 7 5-7 9H5z"/><path d="M9 19h12M7.5 11.5l7 5"/>',
      alert: '<path d="M10.3 3.9 2.4 18a2 2 0 0 0 1.7 3h15.8a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0zM12 9v4M12 17h.01"/>'
    };
    return '<svg class="' + escapeHtml(className || 'button-icon') +
      '" viewBox="0 0 24 24" aria-hidden="true">' + (paths[name] || paths.alert) + '</svg>';
  }

  function fieldInput(id, label, value, readonly, span, extraAttrs) {
    return '<div class="field' + (span > 1 ? ' span-' + span : '') + '"><label for="' + id + '">' + label + '</label>' +
      '<input id="' + id + '" type="text" value="' + escapeHtml(value || '') + '"' +
      (readonly ? ' readonly' : '') + ' ' + (extraAttrs || '') + '></div>';
  }

  function fieldSelect(id, label, value, options, includeBlank, extraAttrs) {
    const opts = (includeBlank ? [{ value: '', label: 'All' }] : [{ value: '', label: 'Select...' }]).concat(
      (options || []).map(function (option) {
        return typeof option === 'string' ? { value: option, label: option } : option;
      })
    );
    return '<div class="field"><label for="' + id + '">' + label + '</label><select id="' + id + '" ' + (extraAttrs || '') + '>' +
      opts.map(function (option) {
        return '<option value="' + escapeHtml(option.value) + '"' + (String(value) === String(option.value) ? ' selected' : '') + '>' +
          escapeHtml(option.label) + '</option>';
      }).join('') +
    '</select></div>';
  }

  function fieldDate(id, label, value) {
    return '<div class="field"><label for="' + id + '">' + label + '</label><input id="' + id + '" type="date" value="' + escapeHtml(toInputDate(value)) + '"></div>';
  }

  function fillSelect(id, values, includeBlank, rawValues) {
    const options = (includeBlank ? [{ value: '', label: 'All' }] : [{ value: '', label: 'Select...' }])
      .concat((values || []).map(function (value) { return { value: value, label: value }; }));
    fillSelectOptions(id, options);
  }

  function fillSelectOptions(id, options) {
    const select = byId(id);
    if (!select) return;
    const current = select.value;
    select.innerHTML = options.map(function (option) {
      return '<option value="' + escapeHtml(option.value) + '">' + escapeHtml(option.label) + '</option>';
    }).join('');
    if (current) select.value = current;
  }

  function uniqueValues(rows, key) {
    const set = {};
    rows.forEach(function (row) {
      const value = valueOrNA(row[key]);
      if (value !== 'NA') set[value] = true;
    });
    return Object.keys(set).sort();
  }

  function badgeForSeverity(value) {
    const text = valueOrNA(value);
    if (text === 'overdue') return '<span class="badge badge-critical">Overdue</span>';
    if (text === 'critical') return '<span class="badge badge-critical">Critical</span>';
    if (text === 'high') return '<span class="badge badge-high">High</span>';
    if (text === 'moderate') return '<span class="badge badge-medium">Moderate</span>';
    if (text === 'closed') return '<span class="badge badge-success">Closed</span>';
    if (text === 'cancelled') return '<span class="badge">Cancelled</span>';
    return '<span class="badge">Low</span>';
  }

  function monthYearMatch(value, month, year) {
    const date = parseDate(value);
    if (!date) return false;
    if (month && (date.getMonth() + 1) !== Number(month)) return false;
    if (year && date.getFullYear() !== Number(year)) return false;
    return true;
  }

  function dateInRange(value, start, end) {
    const date = parseDate(value);
    if (!date) return false;
    if (start) {
      const s = parseDate(start);
      if (s && date.getTime() < s.getTime()) return false;
    }
    if (end) {
      const e = parseDate(end);
      if (e && date.getTime() > e.getTime()) return false;
    }
    return true;
  }

  function parseDate(value) {
    if (!value) return null;
    if (Object.prototype.toString.call(value) === '[object Date]' && !isNaN(value.getTime())) {
      return new Date(value.getFullYear(), value.getMonth(), value.getDate());
    }
    const text = String(value).trim();
    const monthOnly = text.match(/^(\d{4})-(\d{2})$/);
    if (monthOnly) return new Date(Number(monthOnly[1]), Number(monthOnly[2]), 0);
    const iso = text.match(/^(\d{4})-(\d{2})-(\d{2})/);
    if (iso) return new Date(Number(iso[1]), Number(iso[2]) - 1, Number(iso[3]));
    const d = new Date(text);
    if (!isNaN(d.getTime())) return new Date(d.getFullYear(), d.getMonth(), d.getDate());
    return null;
  }

  function toInputMonth(value) {
    const date = parseDate(value);
    if (!date) {
      const text = String(value || '').trim();
      if (/^\d{4}-\d{2}$/.test(text)) return text;
      return '';
    }
    return date.getFullYear() + '-' + String(date.getMonth() + 1).padStart(2, '0');
  }

  function toInputDate(value) {
    const date = parseDate(value);
    if (!date) return '';
    return date.getFullYear() + '-' + String(date.getMonth() + 1).padStart(2, '0') + '-' + String(date.getDate()).padStart(2, '0');
  }

  function formatDateDisplay(value) {
    const date = parseDate(value);
    if (!date) return valueOrNA(value);
    return date.toLocaleDateString('en-PH', { year: 'numeric', month: 'short', day: 'numeric' });
  }

  function formatDateTime(value) {
    if (!value) return 'NA';
    const text = String(value);
    return text.length > 19 ? text.slice(0, 19) : text;
  }

  function showToast(message, type) {
    const toast = document.createElement('div');
    toast.className = 'toast ' + (type || 'success');
    toast.textContent = message;
    byId('toastHost').appendChild(toast);
    window.setTimeout(function () { toast.remove(); }, 4200);
  }

  function getErrorMessage(error, fnName) {
    if (error && error.message) return error.message;
    if (typeof error === 'string' && error.trim()) return error.trim();
    if (error && error.details) return String(error.details);
    return 'Operation failed in ' + fnName + '. No error details were returned by Google Apps Script.';
  }

  function byId(id) { return document.getElementById(id); }
  function setText(id, value) { byId(id).textContent = value; }
  function setHtml(id, value) { byId(id).innerHTML = value; }
  function getInputValue(id, fallback) {
    const input = byId(id);
    if (!input) return fallback === undefined ? '' : fallback;
    return input.value;
  }
  function valueOrNA(value) {
    if (value === undefined || value === null) return 'NA';
    const text = String(value).trim();
    return text === '' ? 'NA' : text;
  }
  function lower(value) {
    return String(value === undefined || value === null ? '' : value).trim().toLowerCase();
  }
  function escapeHtml(value) {
    return String(value === undefined || value === null ? '' : value)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;').replace(/'/g, '&#039;');
  }
</script>
