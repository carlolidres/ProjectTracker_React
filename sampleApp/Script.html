    { key: 'Val_Strategy_remarks', label: 'Val Strategy Remarks', type: 'textarea', role: 'VAL', span: 3, tooltip: 'Describe implementation strategy if change applies to COMML during ongoing study.' },

    { key: 'Report_Sub_Status', label: 'Report Sub Status', type: 'select', role: 'VAL', registry: 'Report_Sub_Status', tooltip: 'Report submission status.' },
    { key: 'Report_target_Date', label: 'Report Target Date', type: 'date', role: 'VAL', tooltip: 'Target date for validation report.' },
    { key: 'ar_availability_date', label: 'AR Availability Date', type: 'date', role: 'QC', tooltip: 'Analytical report availability date.' },
    { key: 'packaging_schedule', label: 'Packaging Schedule', type: 'date', role: 'PP', tooltip: 'Planned packaging schedule.' },
    { key: 'final_status', label: 'Final Status', type: 'select', role: 'PP', registry: 'final_status', tooltip: 'OPEN, CLOSED, CANCELLED, or Others.' },
    { key: 'final_status_other', label: 'Final Status (Others)', type: 'text', role: 'PP', tooltip: 'Required when Final Status is Others or CANCELLED.' }
  ];

  const AppState = {
    currentPage: 'dashboardPage',
    projectRows: [],
    supportRows: [],
    archivedProjectRows: [],
    archivedSupportRows: [],
    auditRows: [],
    registryRows: [],
    registry: {},
    notifications: [],
    editingProjectId: null,
    projectDraft: null,
    projectFormMounted: false,
    databaseDrilldown: null,
    dashboardData: null,
    activeProjectTab: 'AM/BM/PL',
    duplicateHighlights: {},
    hierarchyOpen: {},
    loadingCount: 0,
    loadingError: false,
    loaded: {},
    refreshInProgress: false,
    exportInProgress: false
  };

  const AUTO_REFRESH_MS = 20000;

  document.addEventListener('DOMContentLoaded', initApp);

  function initApp() {
    bindNavigation();
    bindGlobalActions();
    bindFilters();
    restoreUiState();
    runServer('initializeDatabase', [], function (result) {
      setText('pageMeta', 'Connected to ' + ((result && result.spreadsheetName) || 'Project Tracker') +
        ' · Timezone: ' + ((result && result.timezone) || 'Asia/Manila'));
      loadRegistryBundle(function () {
        populateStaticFilters();
        loadNotifications();
        loadCurrentPage();
      });
    });
    window.setInterval(refreshAppDataSilently_, AUTO_REFRESH_MS);
    document.addEventListener('visibilitychange', function () {
      if (!document.hidden) refreshAppDataSilently_();
    });
  }

  function bindNavigation() {
    document.querySelectorAll('.nav-item').forEach(function (button) {
      button.addEventListener('click', function () {
        navigateTo(button.dataset.page);
      });
    });
  }

  function bindGlobalActions() {
    byId('refreshButton').addEventListener('click', refreshCurrentPage);
    byId('notificationButton').addEventListener('click', openNotificationsModal);
    byId('newProjectButton').addEventListener('click', function () { prepareNewProjectForm(true); });
    byId('viewNaFieldsButton').addEventListener('click', openNaFieldsReport);
    byId('expandAllButton').addEventListener('click', function () { setAllHierarchyDetails(true); });
    byId('collapseAllButton').addEventListener('click', function () { setAllHierarchyDetails(false); });
    byId('databaseExportButton').addEventListener('click', exportDatabaseExcel);
    byId('databaseRefreshButton').addEventListener('click', loadDatabase);
    byId('newSupportButton').addEventListener('click', function () { openSupportModal(null); });
    byId('supportExportButton').addEventListener('click', exportSupportExcel);
    byId('supportRefreshButton').addEventListener('click', loadSupportActivities);
    byId('auditRefreshButton').addEventListener('click', loadAuditTrail);
    byId('archivedRefreshButton').addEventListener('click', function () { loadArchived(true); });
    byId('messageAdminButton').addEventListener('click', openAdminMessageModal);
    byId('newRegistryButton').addEventListener('click', addRegistryValue);
    byId('registryValueInput').addEventListener('keydown', function (event) {
      if (event.key === 'Enter') addRegistryValue();
    });
    byId('registryRefreshButton').addEventListener('click', loadRegistryPage);
    byId('modalCloseButton').addEventListener('click', closeModal);
  }

  function bindFilters() {
    [
      'dashboardSearch',       'databaseSearch', 'databaseOwnerFilter', 'databaseActivityFilter', 'databaseCnfStatusFilter',
      'databaseStatusFilter', 'databaseFgMonth', 'databaseFgYear', 'supportSearch',
      'supportKindFilter', 'supportDepartmentFilter', 'auditSearch', 'auditStartDate',
      'auditEndDate', 'auditUserFilter', 'auditModuleFilter', 'auditActionFilter',
      'auditProjectFilter', 'registryTypeFilter'
    ].forEach(function (id) {
      const element = byId(id);
      if (!element) return;
      element.addEventListener('input', function () {
        if (id.indexOf('database') === 0) AppState.databaseDrilldown = null;
        scheduleRenderCurrentPage();
      });
      element.addEventListener('change', function () {
        if (id.indexOf('database') === 0) AppState.databaseDrilldown = null;
        scheduleRenderCurrentPage();
      });
    });
  }

  function restoreUiState() {
    const lastPage = sessionStorage.getItem('projectTracker:lastPage');
    if (lastPage && byId(lastPage)) navigateTo(lastPage, true);
  }

  function navigateTo(pageId, silent) {
    AppState.currentPage = pageId;
    sessionStorage.setItem('projectTracker:lastPage', pageId);
    document.querySelectorAll('.page').forEach(function (page) {
      page.classList.toggle('active', page.id === pageId);
    });
    document.querySelectorAll('.nav-item').forEach(function (button) {
      button.classList.toggle('active', button.dataset.page === pageId);
    });
    const nav = document.querySelector('.nav-item[data-page="' + pageId + '"]');
    if (nav) setText('pageTitle', nav.textContent);
    if (!silent) loadCurrentPage();
  }

  function scheduleRenderCurrentPage() {
    window.clearTimeout(AppState.renderTimer);
    AppState.renderTimer = window.setTimeout(renderCurrentPage, 180);
  }

  function refreshCurrentPage() {
    AppState.loaded = {};
    loadCurrentPage(true);
  }

  function syncDataAfterWrite_(options) {
    const opts = options || {};
    AppState.loaded.dashboard = false;
    AppState.loaded.database = false;
    AppState.loaded.support = false;
    AppState.loaded.archived = false;
    if (opts.audit !== false) AppState.loaded.audit = false;
    loadNotifications();
    loadDashboard(true);
    loadDatabase(true);
    if (AppState.currentPage === 'auditPage') loadAuditTrail(true);
    if (AppState.currentPage === 'archivedPage') loadArchived(true);
    if (opts.registry) {
      AppState.loaded.registry = false;
      loadRegistryBundle(function () {
        populateStaticFilters();
        loadRegistryPage(true);
      });
    }
  }

  function refreshAppDataSilently_() {
    if (document.hidden || AppState.loadingCount > 0 || AppState.refreshInProgress) return;
    AppState.refreshInProgress = true;
    AppState.loaded.dashboard = false;
    AppState.loaded.database = false;
    AppState.loaded.support = false;
    let pending = 2;
    function finishRefresh_(hasError) {
      pending -= 1;
      if (pending <= 0) AppState.refreshInProgress = false;
      if (hasError && pending <= 0) AppState.refreshInProgress = false;
    }
    runServer('getDashboardData', [], function (data) {
      AppState.loaded.dashboard = true;
      AppState.dashboardData = data || {};
      AppState.lastWorklist = (data && data.worklist) || [];
      if (AppState.currentPage === 'dashboardPage') renderDashboard(data);
      finishRefresh_(false);
    }, { silent: true, onFailure: function () { finishRefresh_(true); } });
    runServer('getDatabaseData', [], function (result) {
      AppState.loaded.database = true;
      AppState.loaded.support = true;
      AppState.projectRows = (result && result.projects) || [];
      AppState.supportRows = (result && result.support) || [];
      updateOwnerFilter();
      if (AppState.currentPage === 'databasePage') {
        renderDatabaseTable(getFilteredProjectRows());
      }
      finishRefresh_(false);
    }, { silent: true, onFailure: function () { finishRefresh_(true); } });
    if (AppState.currentPage === 'registryPage') {
      pending += 1;
      runServer('getSheetData', [SHEETS.REGISTRY], function (result) {
        AppState.loaded.registry = true;
        AppState.registryRows = (result && result.rows) || [];
        renderRegistryTable(getFilteredRegistryRows());
        finishRefresh_(false);
      }, { silent: true, onFailure: function () { finishRefresh_(true); } });
    }
  }

  function exportDatabaseExcel() {
    if (AppState.exportInProgress) return;
    const rows = getFilteredProjectRows();
    if (!rows.length) {
      showToast('No records to export for the current filters.', 'warning');
      return;
    }
    AppState.exportInProgress = true;
    try {
      const headers = DATABASE_COLUMNS.map(function (col) { return col.label; });
      const bodyRows = rows.map(function (row) {
        return DATABASE_COLUMNS.map(function (col) {
          return exportCellValue_(row[col.key]);
        });
      });
      const stamp = new Date().toISOString().slice(0, 10);
      downloadBlob_(
        buildExcelXml_(headers, bodyRows, 'Projects Database'),
        'project-database-' + stamp + '.xls',
        'application/vnd.ms-excel'
      );
      showToast('Exported ' + rows.length + ' record(s) to Excel.', 'success');
    } finally {
      AppState.exportInProgress = false;
    }
  }

  function exportCellValue_(value) {
    if (value === undefined || value === null) return '';
    const text = String(value).trim();
    if (!text || text.toUpperCase() === 'NA' || text.toUpperCase() === 'N/A') return '';
    if (parseDate(value)) return formatDateDisplay(value);
    return text;
  }

  function exportSupportExcel() {
    if (AppState.exportInProgress) return;
    const rows = getFilteredSupportRows();
    if (!rows.length) {
      showToast('No support activities to export for the current filters.', 'warning');
      return;
    }
    AppState.exportInProgress = true;
    try {
      const headers = SUPPORT_COLUMNS.map(function (col) { return col.label; });
      const bodyRows = rows.map(function (row) {
        return SUPPORT_COLUMNS.map(function (col) {
          return exportCellValue_(row[col.key]);
        });
      });
      const stamp = new Date().toISOString().slice(0, 10);
      downloadBlob_(
        buildExcelXml_(headers, bodyRows, 'Support Activities'),
        'support-activities-' + stamp + '.xls',
        'application/vnd.ms-excel'
      );
      showToast('Exported ' + rows.length + ' support activity record(s).', 'success');
    } finally {
      AppState.exportInProgress = false;
    }
  }

  function buildExcelXml_(headers, rows, worksheetName) {
    let xml = '<?xml version="1.0"?><?mso-application progid="Excel.Sheet"?>';
    xml += '<Workbook xmlns="urn:schemas-microsoft-com:office:spreadsheet" xmlns:ss="urn:schemas-microsoft-com:office:spreadsheet">';
    xml += '<Worksheet ss:Name="' + escapeXml_(worksheetName || 'Export') + '"><Table>';
    xml += buildExcelRow_(headers);
    rows.forEach(function (row) { xml += buildExcelRow_(row); });
    xml += '</Table></Worksheet></Workbook>';
    return xml;
  }

  function buildExcelRow_(cells) {
    return '<Row>' + cells.map(function (cell) {
      return '<Cell><Data ss:Type="String">' + escapeXml_(cell) + '</Data></Cell>';
    }).join('') + '</Row>';
  }

  function escapeXml_(value) {
    return String(value === undefined || value === null ? '' : value)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;').replace(/'/g, '&apos;');
  }

  function downloadBlob_(content, filename, mimeType) {
    const blob = new Blob(['\ufeff' + content], { type: mimeType + ';charset=utf-8;' });
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = filename;
    document.body.appendChild(link);
    link.click();
    link.remove();
    window.setTimeout(function () { URL.revokeObjectURL(link.href); }, 1000);
  }

  function loadCurrentPage(force) {
    const page = AppState.currentPage;
    if (page === 'dashboardPage') loadDashboard(force);
    else if (page === 'projectsPage') {
      if (!AppState.projectDraft) prepareNewProjectForm(false);
      else if (!AppState.projectFormMounted || force) renderProjectFormHost();
    }
    else if (page === 'databasePage') loadDatabase(force);
    else if (page === 'supportPage') loadSupportActivities(force);
    else if (page === 'auditPage') loadAuditTrail(force);
    else if (page === 'archivedPage') loadArchived(force);
    else if (page === 'registryPage') loadRegistryPage(force);
  }

  function renderCurrentPage() {
    const page = AppState.currentPage;
    if (page === 'dashboardPage') renderWorklist(filterWorklist(AppState.lastWorklist || []));
    else if (page === 'databasePage') renderDatabaseTable(getFilteredProjectRows());
    else if (page === 'supportPage') renderSupportTable(getFilteredSupportRows());
    else if (page === 'auditPage') renderAuditTable(getFilteredAuditRows());
    else if (page === 'archivedPage') renderArchivedTables();
    else if (page === 'registryPage') renderRegistryTable(getFilteredRegistryRows());
  }

  function loadRegistryBundle(callback) {
    runServer('getRegistryBundle', [], function (bundle) {
      AppState.registry = bundle || {};
      callback();
    });
  }

  function populateStaticFilters() {
    fillSelect('databaseActivityFilter', AppState.registry.activity_type, true);
    fillSelect('databaseCnfStatusFilter', AppState.registry.cnf_status, true);
    fillSelect('databaseStatusFilter', AppState.registry.final_status, true);
    fillSelect('supportDepartmentFilter', AppState.registry.department, true);
    fillSelect('registryTypeFilter', REGISTRY_TYPES, true, true);
    fillSelect('auditModuleFilter', ['Projects', 'Support Activities', 'Registry'], true);
    fillSelect('auditActionFilter', ['CREATE', 'UPDATE', 'DELETE'], true);
    fillMonthYearFilters();
  }

  function fillMonthYearFilters() {
    const months = [{ value: '', label: 'All months' }];
    ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'].forEach(function (name, index) {
      months.push({ value: String(index + 1), label: name });
    });
    fillSelectOptions('databaseFgMonth', months);
    const years = [{ value: '', label: 'All years' }];
    const currentYear = new Date().getFullYear();
    for (let y = currentYear - 2; y <= currentYear + 3; y += 1) years.push({ value: String(y), label: String(y) });
    fillSelectOptions('databaseFgYear', years);
  }

  function loadNotifications() {
    runServer('getNotifications', [], function (rows) {
      AppState.notifications = rows || [];
      setText('notificationCount', String(AppState.notifications.length));
    });
  }

  function loadDashboard(force) {
    if (AppState.loaded.dashboard && !force) {
      renderDashboard(AppState.dashboardData);
      return;
    }
    runServer('getDashboardData', [], function (data) {
      AppState.loaded.dashboard = true;
      AppState.dashboardData = data || {};
      AppState.lastWorklist = (data && data.worklist) || [];
      renderDashboard(data);
      setText('pageMeta', 'Dashboard updated ' + ((data && data.generatedAt) || ''));
    });
  }

  function renderDashboard(data) {
    if (!data) return;
    const cards = data.cards || {};

    setText('cardTotalOpen', String(cards.totalOpen || 0));
    setText('cardTotalClosed', String(cards.totalClosed || 0));
    setText('cardOverdue', String(cards.overdue || 0));
    setText('cardDueWithin7', String(cards.dueWithin7 || 0));

  function renderSegmentedChart(hostId, counts, centerLabel, onClick) {
    const host = byId(hostId);
    const config = CHART_CONFIGS[hostId] || { order: [], colors: {} };
    const countKeys = Object.keys(counts);
    const orderedKeys = config.order.filter(function (key) {
      return Object.prototype.hasOwnProperty.call(counts, key);
    }).concat(countKeys.filter(function (key) {
      return config.order.indexOf(key) === -1;
    }).sort());
    const entries = orderedKeys.map(function (key) {
      return {
        label: key,
        value: Number(counts[key]) || 0,
        color: config.colors[key] || stableChartColor_(key)
      };
    }).filter(function (entry) {
      return entry.value > 0 || countKeys.length <= 6;
    });
    const total = entries.reduce(function (sum, entry) { return sum + entry.value; }, 0);
    let cursor = 0;
    const segments = entries.map(function (entry) {
      const start = cursor;
      cursor += total > 0 ? (entry.value / total) * 100 : 0;
      return entry.color + ' ' + start + '% ' + cursor + '%';
    });
    const gradient = total > 0 ? segments.join(',') : '#dbe4f0';
    host.innerHTML =
      '<div class="dashboard-chart-layout">' +
        '<div class="segmented-donut" style="--chart-segments: conic-gradient(' + gradient + ')">' +
          '<div><strong>' + total + '</strong><span>' + escapeHtml(centerLabel) + '</span></div>' +
        '</div>' +
        '<div class="chart-legend">' +
          entries.map(function (entry) {
            return '<button type="button" class="chart-legend-action" data-label="' + escapeHtml(entry.label) + '">' +
              '<span class="chart-legend-dot" style="background:' + entry.color + '"></span>' +
              '<span>' + escapeHtml(entry.label) + '</span><strong>' + entry.value + '</strong></button>';
          }).join('') +
        '</div>' +
      '</div>';
    host.querySelectorAll('.chart-legend-action').forEach(function (button) {
      button.addEventListener('click', function () {
        if (onClick) onClick(button.getAttribute('data-label'));
      });
    });
  }

  function stableChartColor_(label) {
    const text = String(label || '');
    let hash = 0;
    for (let index = 0; index < text.length; index += 1) {
      hash = ((hash << 5) - hash) + text.charCodeAt(index);
      hash |= 0;
    }
    return CHART_COLORS[Math.abs(hash) % CHART_COLORS.length];
  }

  function renderDepartmentPending(counts, cards) {

      return '<button type="button" class="department-action-button" data-role="' + role.key + '">' +
        '<span class="department-action-row"><span class="button-with-icon">' + iconSvg_(projectTabKey_(role.key), 'button-icon') +
        role.label + '</span>' +

  function renderMonthlyTrend(values) {
    const host = byId('monthlyTrendChart');
    if (!values.length) {
      host.innerHTML = '<div class="empty-state">No trend data yet.</div>';
      return;
    }
    const max = Math.max(1, Math.max.apply(null, values.map(function (item) { return item.count; })));
    const points = values.map(function (item, index) {
      return {
        label: item.label,
        count: item.count,
        x: 45 + index * (510 / Math.max(1, values.length - 1)),
        y: 135 - (item.count / max) * 100
      };
    });
    const path = points.map(function (point, index) {
      return (index === 0 ? 'M' : 'L') + ' ' + point.x + ' ' + point.y;
    }).join(' ');
    host.innerHTML =
      '<svg viewBox="0 0 600 180" role="img" aria-label="Monthly closed trend">' +
        [35, 85, 135].map(function (y) {
          return '<line x1="45" x2="555" y1="' + y + '" y2="' + y + '" class="trend-grid-line"></line>';
        }).join('') +
        '<path d="' + path + '" class="trend-line-path"></path>' +
        points.map(function (point, index) {
          return '<g><circle cx="' + point.x + '" cy="' + point.y + '" r="5" class="' +
            (index === points.length - 1 ? 'trend-point trend-point-latest' : 'trend-point') + '"></circle>' +
            '<text x="' + point.x + '" y="164" text-anchor="middle" class="trend-month-label">' + escapeHtml(point.label) + '</text></g>';
        }).join('') +
      '</svg>';
  }

    AppState.databaseDrilldown = filter || null;
    if (filter && filter.cnf_status) byId('databaseCnfStatusFilter').value = filter.cnf_status;
    if (filter && filter.final_status) byId('databaseStatusFilter').value = filter.final_status;
    if (filter && filter.project_id) byId('databaseSearch').value = filter.project_id;
    if (filter && filter.drill === 'all') {

      return blob.indexOf(search) !== -1;
    });

        WORKLIST_COLUMNS.map(function (col) {

          if (col.key === 'severity') value = badgeForSeverity(value);
          else if (col.key === 'project_id') value = projectLinkHtml_(value);
          else if (col.key === 'fg_month') value = formatDateDisplay(value);
          else if (col.key === 'daysRemaining' && isMissingValue_(value)) value = '<span class="na-text">' + NA_VALUE + '</span>';
          else value = escapeHtml(valueOrNA(value));

  function loadDatabase(force) {
    if (AppState.loaded.database && !force) {
      renderDatabaseTable(getFilteredProjectRows());
      updateOwnerFilter();
      return;
    }
    runServer('getDatabaseData', [], function (result) {
      AppState.loaded.database = true;
      AppState.projectRows = (result && result.projects) || [];
      AppState.supportRows = (result && result.support) || [];
      AppState.loaded.support = true;
      updateOwnerFilter();
      renderDatabaseTable(getFilteredProjectRows());
    });
  }

  function updateOwnerFilter() {
    const owners = uniqueValues(AppState.projectRows, 'project_owner');
    fillSelect('databaseOwnerFilter', owners, true);
  }

  function getFilteredProjectRows() {
    const drill = AppState.databaseDrilldown || {};
    return AppState.projectRows.filter(function (row) {
      if (drill.project_id && valueOrNA(row.project_id) !== drill.project_id) {
        if (lower(row.project_id).indexOf(lower(drill.project_id)) === -1) return false;
      }
      if (drill.cnf_status && valueOrNA(row.cnf_status) !== drill.cnf_status) return false;
      if (drill.final_status && valueOrNA(row.final_status) !== drill.final_status) return false;
      if (drill.pendingRole && !rowPendingRole_(row, drill.pendingRole)) return false;
      if (drill.dueWindow && !rowMatchesDueWindow_(row, drill.dueWindow)) return false;
      if (drill.drill === 'open' && !isOpenStatus_(row.final_status)) return false;
      if (drill.drill === 'closed' && valueOrNA(row.final_status) !== 'CLOSED') return false;
      if (drill.drill === 'overdue' && !rowMatchesDueWindow_(row, 'overdue')) return false;
      if (drill.drill === 'due7' && !rowMatchesDueWindow_(row, '7')) return false;
      if (drill.drill === 'pendingCnf' && (valueOrNA(row.cnf_status) === 'Approved' || !isOpenStatus_(row.final_status))) return false;
      if (drill.drill === 'pendingProtocol' && (isApprovedLike_(row.protocol_Status) || !isOpenStatus_(row.final_status))) return false;
      if (drill.drill === 'pendingReport' && (isApprovedLike_(row.Report_Sub_Status) || !isOpenStatus_(row.final_status))) return false;

      const search = lower(getInputValue('databaseSearch'));
      if (search) {
        const blob = DATABASE_COLUMNS.map(function (col) { return row[col.key]; }).join(' ').toLowerCase();
        if (blob.indexOf(search) === -1) return false;
      }
      const owner = getInputValue('databaseOwnerFilter');
      if (owner && valueOrNA(row.project_owner) !== owner) return false;
      const activity = getInputValue('databaseActivityFilter');
      if (activity && valueOrNA(row.activity_type) !== activity) return false;
      const cnfStatus = getInputValue('databaseCnfStatusFilter');
      if (cnfStatus && valueOrNA(row.cnf_status) !== cnfStatus) return false;
      const status = getInputValue('databaseStatusFilter');
      if (status && valueOrNA(row.final_status) !== status) return false;
      const month = getInputValue('databaseFgMonth');
      const year = getInputValue('databaseFgYear');
      if ((month || year) && !monthYearMatch(row.fg_month, month, year)) return false;
      return true;
    }).sort(compareProjectPriority_);
  }

  function isOpenStatus_(status) {
    const value = valueOrNA(status);
    return value === 'OPEN' || value === 'Others' || value === 'NA' || value === NA_VALUE;
  }

  function isApprovedLike_(status) {
    return valueOrNA(status) === 'Approved';
  }

  function rowMatchesDueWindow_(row, windowKey) {
    const date = parseDate(row.fg_month);
    if (!date) return false;
    const today = new Date();
    const base = new Date(today.getFullYear(), today.getMonth(), today.getDate());
    const days = Math.round((date.getTime() - base.getTime()) / (24 * 60 * 60 * 1000));
    if (!isOpenStatus_(row.final_status)) return false;
    if (windowKey === 'overdue') return days < 0;
    if (windowKey === 'today') return days === 0;
    if (windowKey === '3') return days >= 0 && days <= 3;
    if (windowKey === '7') return days >= 0 && days <= 7;
    if (windowKey === '15') return days >= 0 && days <= 15;
    if (windowKey === '30') return days >= 0 && days <= 30;
    return true;
  }

  function rowPendingRole_(row, role) {
    if (!isOpenStatus_(row.final_status)) return false;
    return (OWNER_FIELD_GROUPS[role] || []).some(function (field) { return isMissingValue_(row[field]); });
  }

  function compareProjectPriority_(a, b) {
    const pa = projectPriorityMeta_(a);
    const pb = projectPriorityMeta_(b);
    return pa.rank - pb.rank ||
      pa.fgTime - pb.fgTime ||
      pb.incompleteCount - pa.incompleteCount ||
      String(valueOrNA(a.project_id)).localeCompare(String(valueOrNA(b.project_id)));
  }

  function projectPriorityMeta_(row) {
    const status = valueOrNA(row.final_status);
    if (status === 'CANCELLED') return { rank: 6, fgTime: dateSortValue_(row.fg_month), incompleteCount: 0 };
    if (status === 'CLOSED') return { rank: 5, fgTime: dateSortValue_(row.fg_month), incompleteCount: 0 };
    const days = projectDueDays_(row);
    let rank = 4;
    if (days !== null && days < 0) rank = 0;
    else if (days !== null && days <= 15) rank = 1;
    else if (days !== null && days <= 30) rank = 2;
    else if (days !== null && days <= 60) rank = 3;
    return {
      rank: rank,
      fgTime: dateSortValue_(row.fg_month),
      incompleteCount: incompleteMilestoneCount_(row)
    };
  }

  function projectDueDays_(row) {
    const dates = [row.fg_month];
    [
      [row.client_approval_target_date, row.cnf_status === 'Approved'],
      [row.protocol_target_date, isApprovedLike_(row.protocol_Status)],
      [row.manufacturing_start_week, false],
      [row.ar_availability_date, false],
      [row.packaging_schedule, false],
      [row.Report_target_Date, isApprovedLike_(row.Report_Sub_Status)]
    ].forEach(function (item) {
      if (!item[1] && !isMissingValue_(item[0])) dates.push(item[0]);
    });
    const parsed = dates.map(parseDate).filter(Boolean).sort(function (a, b) { return a.getTime() - b.getTime(); });
    if (!parsed.length) return null;
    const today = new Date();
    const base = new Date(today.getFullYear(), today.getMonth(), today.getDate());
    return Math.round((parsed[0].getTime() - base.getTime()) / (24 * 60 * 60 * 1000));
  }

  function dateSortValue_(value) {
    const date = parseDate(value);
    return date ? date.getTime() : Number.MAX_SAFE_INTEGER;
  }

  function incompleteMilestoneCount_(row) {
    const fields = ['cnf_status', 'client_approval_target_date', 'protocol_no', 'protocol_Status', 'Val_Activity', 'Val_Strategy', 'manufacturing_start_week', 'ar_availability_date', 'packaging_schedule', 'Report_target_Date', 'Report_Sub_Status', 'final_status'];
    return fields.reduce(function (count, field) {
      if (field === 'cnf_status') return count + (row[field] === 'Approved' ? 0 : 1);
      if (field === 'protocol_Status' || field === 'Report_Sub_Status') return count + (isApprovedLike_(row[field]) ? 0 : 1);
      return count + (isMissingValue_(row[field]) ? 1 : 0);
    }, 0);
  }

  function renderDatabaseTable(rows) {
    const host = byId('databaseTable');
    if (!rows.length) {
      host.innerHTML = '<div class="empty-state">No project records found.</div>';
      return;
    }
    host.innerHTML = buildTable(DATABASE_COLUMNS, rows, function (row) {
      return '<tr>' +

          const content = col.key === 'project_id' ? projectLinkHtml_(row[col.key]) : escapeHtml(display);

        '<td class="actions-cell">' +
          '<button class="row-action button-with-icon" data-edit-project="' + escapeHtml(row.project_id) + '">' +
            iconSvg_('edit', 'button-icon') + 'Edit</button>' +
        '</td>' +
      '</tr>';

    bindProjectLinks_(host);
    host.querySelectorAll('[data-edit-project]').forEach(function (button) {

        event.stopPropagation();
