  }

  function populateAuditFilters() {
    setSelectOptions('auditModuleFilter', uniqueValues(AppState.auditRows, 'Module'), 'All Modules');
    setSelectOptions('auditActionFilter', uniqueValues(AppState.auditRows, 'Action'), 'All Actions');
  }

  function populateRegistryFilters() {
    const values = uniqueValues(AppState.registryRows, 'Registry Type');
    setRegistryTypeOptions(values.length ? values : REGISTRY_TYPES);
  }

  function populateArchivedFilters() {
    const years = AppState.archivedRows.map(function (row) { return getYearFromText(row[PRIMARY_KEY]); }).filter(Boolean);
    setSelectOptions('archivedYearFilter', Array.from(new Set(years)).sort().reverse(), 'All Years');
  }

  function setSelectOptions(id, values, placeholder) {
    const select = byId(id);
    if (!select) return;
    const current = select.value;
    const unique = Array.from(new Set((values || []).filter(function (value) { return valueOrNA(value) !== 'NA' || id.indexOf('Status') !== -1; }))).sort();
    if (current && unique.indexOf(current) === -1) unique.unshift(current);
    select.innerHTML = '<option value="">' + escapeHtml(placeholder) + '</option>' +
      unique.map(function (value) {
        return '<option value="' + escapeHtml(value) + '">' + escapeHtml(value) + '</option>';
      }).join('');
    if (unique.indexOf(current) !== -1) select.value = current;
  }

  function setMonthOptions(id) {
    const select = byId(id);
    if (!select) return;
    const current = select.value;
    select.innerHTML = '<option value="">All months</option>' + DATE_MONTHS.map(function (month, index) {
      return '<option value="' + (index + 1) + '">' + escapeHtml(month) + '</option>';
    }).join('');
    if (current) select.value = current;
  }

  function setMissingFilterOptions() {
    const select = byId('databaseMissingFilter');
    if (!select) return;
    const current = select.value;
    select.innerHTML = MISSING_FILTER_OPTIONS.map(function (option) {
      return '<option value="' + escapeHtml(option.value) + '">' + escapeHtml(option.label) + '</option>';
    }).join('');
    select.value = MISSING_FILTER_OPTIONS.some(function (option) { return option.value === current; }) ? current : '';
  }

  function setRegistryTypeOptions(values) {
    const select = byId('registryTypeFilter');
    if (!select) return;
    const current = select.value || REGISTRY_TYPES[0];
    const unique = Array.from(new Set((values || REGISTRY_TYPES).filter(function (value) {
      return valueOrNA(value) !== 'NA';
    }))).sort();
    select.innerHTML = unique.map(function (value) {
      return '<option value="' + escapeHtml(value) + '">' + escapeHtml(value) + '</option>';
    }).join('');
    select.value = unique.indexOf(current) !== -1 ? current : (unique[0] || '');
  }

  function uniqueValues(rows, key) {
    return Array.from(new Set(rows.map(function (row) { return getValue(row, key); }).filter(Boolean)));
  }

  function uniqueInitiators() {
    return Array.from(new Set(AppState.cnfRows.map(getInitiatorValue).filter(function (value) {
      return !isMissingTrackingValue(value);
    }))).sort();
  }

  function uniqueYearsFromRows(rows, key) {
    const years = rows.map(function (row) {
      const date = parseDate(row[key]);
      return date ? String(date.getFullYear()) : '';
    }).filter(Boolean);
    return Array.from(new Set(years)).sort();
  }

  function registryValues(type, fallback) {
    const rows = AppState.registry[type] || [];
    const values = rows.map(function (row) { return row['Registry Value']; }).filter(Boolean);
    return values.length ? values : fallback;
  }

  function updateNotificationFromCnfRows() {
    const count = AppState.cnfRows.filter(function (row) {
      return row['CNF Status'] !== 'Closed' && ['Overdue', 'Due today', 'Due within 15 days', 'Due within 30 days', 'Due within 1 month', 'Due within 3 months', 'Critical', 'High'].indexOf(row['Priority Level']) !== -1;
    }).length;
    byId('notificationCount').textContent = count;
  }

  function openExportModal(moduleName) {
    const rows = moduleName === 'Archived' ? getFilteredArchivedRows() : getFilteredDatabaseRows();
    openModal(moduleName + ' Export', [
      '<div class="form-section"><div class="form-grid">',
      selectHtml('exportFormat', 'File Type', ['Excel', 'CSV', 'TSV'], 'Excel', true),
      '<div class="readonly-item"><span>Record Count</span><strong>' + rows.length + '</strong></div>',
      '</div></div>'
    ].join(''), [
      { label: 'Cancel', className: 'secondary-button', action: closeModal },
      { label: 'Export', className: 'primary-button', action: function (button) { submitExport(moduleName, button); } }
    ]);
    applyNADefaults(byId('modalBody'));
  }

  function submitExport(moduleName, button) {
    const format = byId('exportFormat').value;
    const rows = moduleName === 'Archived' ? getFilteredArchivedRows() : getFilteredDatabaseRows();
    const headers = moduleName === 'Archived' ? ARCHIVED_EXPORT_HEADERS : CNF_EXPORT_HEADERS;
    const fileName = buildExportFileName(moduleName, format);
    setButtonBusy(button, true);
    runServer('logDataActivity', [{
      moduleName: moduleName,
      operation: 'export',
      action: moduleName + ' export completed',
      fileType: format,
      fileName: fileName,
      recordCount: rows.length,
      resultSummary: 'Exported ' + rows.length + ' filtered record(s) to ' + format + '.'
    }], function () {
      setButtonBusy(button, false);
      downloadExportFile(rows, headers, format, fileName);
      showToast(format + ' export generated.', 'success');
      closeModal();
      if (AppState.currentPage === 'auditPage') loadAuditTrail();
    }, function () {
      setButtonBusy(button, false);
    });
  }

  function downloadExportFile(rows, headers, format, fileName) {
    let content = '';
    let mime = 'text/plain;charset=utf-8;';
    if (format === 'CSV') {
      content = buildDelimitedExport(rows, headers, ',');
      mime = 'text/csv;charset=utf-8;';
    } else if (format === 'TSV') {
      content = buildDelimitedExport(rows, headers, '\t');
      mime = 'text/tab-separated-values;charset=utf-8;';
    } else {
      content = buildExcelHtmlExport(rows, headers);
      mime = 'application/vnd.ms-excel;charset=utf-8;';
    }
    const blob = new Blob([content], { type: mime });
    const url = URL.createObjectURL(blob);
    const link = document.createElement('a');
    link.href = url;
    link.download = fileName;
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    URL.revokeObjectURL(url);
  }

  function buildDelimitedExport(rows, headers, delimiter) {
    const table = [headers].concat(rows.map(function (row) {
      return headers.map(function (header) { return getValue(row, header); });
    }));
    return table.map(function (line) {
      return line.map(function (value) {
        return delimiter === ',' ? csvEscape(value) : tsvEscape(value);
      }).join(delimiter);
    }).join('\n');
  }

  function buildExcelHtmlExport(rows, headers) {
    const headerHtml = headers.map(function (header) {
      return '<th>' + escapeHtml(header) + '</th>';
    }).join('');
    const bodyHtml = rows.map(function (row) {
      return '<tr>' + headers.map(function (header) {
        return '<td>' + escapeHtml(getValue(row, header)) + '</td>';
      }).join('') + '</tr>';
    }).join('');
    return '<html><head><meta charset="UTF-8"></head><body><table><thead><tr>' + headerHtml +
      '</tr></thead><tbody>' + bodyHtml + '</tbody></table></body></html>';
  }

  function buildExportFileName(moduleName, format) {
    const date = new Date().toISOString().slice(0, 10);
    const extension = format === 'CSV' ? 'csv' : (format === 'TSV' ? 'tsv' : 'xls');
    return moduleName.replace(/\s+/g, '_') + '_Export_' + date + '.' + extension;
  }

  function openImportModal(moduleName) {
    AppState.pendingImport = null;
    openModal(moduleName + ' Import Data', [
      '<div class="form-section"><div class="form-grid">',
      '<div class="field span-2"><label for="importFile">Import File</label><input id="importFile" type="file" accept=".xlsx,.xls,.csv,.tsv"></div>',
      '<div id="importSummary" class="readonly-item span-3"><span>Status</span><strong>Select an Excel, CSV, or TSV file to validate.</strong></div>',
      '</div></div>'
    ].join(''), [
      { label: 'Cancel', className: 'secondary-button', action: closeModal },
      { label: 'Validate File', className: 'primary-button', action: function (button) { previewImport(moduleName, button); } }
    ]);
  }

  function previewImport(moduleName, button) {
    const fileInput = byId('importFile');
    const file = fileInput && fileInput.files ? fileInput.files[0] : null;
    if (!file) {
      showToast('Choose an import file first.', 'warning');
      return;
    }
    setButtonBusy(button, true);
    const reader = new FileReader();
    reader.onload = function () {
      runServer('previewImportRecords', [moduleName, {
        name: file.name,
        mimeType: file.type,
        data: reader.result
      }], function (result) {
        setButtonBusy(button, false);
        AppState.pendingImport = result;
        renderImportPreview(moduleName, result);
      }, function () {
        setButtonBusy(button, false);
      });
    };
    reader.onerror = function () {
      setButtonBusy(button, false);
      showToast('The selected file could not be read.', 'error');
    };
    reader.readAsDataURL(file);
  }

  function renderImportPreview(moduleName, result) {
    const summary = result.summary || {};
    const duplicateOptions = summary.duplicates ? [
      '<div class="field"><label for="duplicateMode">Duplicate Primary Keys</label>',
      '<select id="duplicateMode">',
      '<option value="skip">Skip duplicate records</option>',
      '<option value="overwrite">Overwrite duplicate records</option>',
      '<option value="cancel">Cancel import if duplicates exist</option>',
      '</select></div>'
    ].join('') : '';
    const errorRows = (result.records || []).filter(function (row) { return row.errors && row.errors.length; }).slice(0, 5);
    const errorHtml = errorRows.length ? '<div class="import-errors">' + errorRows.map(function (row) {
      return '<div>Row ' + row.rowNumber + ': ' + escapeHtml(row.errors.join('; ')) + '</div>';
    }).join('') + '</div>' : '';
    byId('modalBody').innerHTML = [
      '<div class="form-section"><div class="form-grid">',
      '<div class="readonly-item"><span>File</span><strong>' + escapeHtml(result.fileName) + '</strong></div>',
      '<div class="readonly-item"><span>File Type</span><strong>' + escapeHtml(result.fileType) + '</strong></div>',
      '<div class="readonly-item"><span>Processed</span><strong>' + (summary.processed || 0) + '</strong></div>',
      '<div class="readonly-item"><span>Ready</span><strong>' + (summary.ready || 0) + '</strong></div>',
      '<div class="readonly-item"><span>Duplicates</span><strong>' + (summary.duplicates || 0) + '</strong></div>',
      '<div class="readonly-item"><span>Error Rows</span><strong>' + (summary.errors || 0) + '</strong></div>',
      duplicateOptions,
      '</div></div>',
      errorHtml
    ].join('');
    byId('modalFooter').innerHTML = [
      '<button id="modalButton_0" class="secondary-button">Cancel</button>',
      '<button id="modalButton_1" class="primary-button">Import Data</button>'
    ].join('');
    byId('modalButton_0').addEventListener('click', closeModal);
    byId('modalButton_1').addEventListener('click', function () { commitImport(moduleName, byId('modalButton_1')); });
  }

  function commitImport(moduleName, button) {
    if (!AppState.pendingImport) {
      showToast('Validate an import file first.', 'warning');
      return;
    }
    const duplicateModeInput = byId('duplicateMode');
    const duplicateMode = duplicateModeInput ? duplicateModeInput.value : 'skip';
    setButtonBusy(button, true);
    runServer('commitImportRecords', [
      moduleName,
      AppState.pendingImport.records || [],
      duplicateMode,
      {
        fileName: AppState.pendingImport.fileName,
        fileType: AppState.pendingImport.fileType
      }
    ], function (result) {
      setButtonBusy(button, false);
      showToast(result.message || 'Import completed.', result.cancelled ? 'warning' : 'success');
      closeModal();
      if (moduleName === 'Archived') loadArchived();
      if (moduleName === 'Database') {
        loadCnfData();
        if (AppState.currentPage === 'dashboardPage') loadDashboard();
      }
      if (AppState.currentPage === 'auditPage') loadAuditTrail();
    }, function () {
      setButtonBusy(button, false);
    });
  }

  function runServer(functionName, args, onSuccess, onFailure) {
    setLoading(true);
    const runner = google.script.run
      .withSuccessHandler(function (result) {
        setLoading(false, true);
        if (onSuccess) onSuccess(result);
      })
      .withFailureHandler(function (error) {
        setLoading(false);
        showToast(getErrorMessage(error, functionName), 'error');
        if (onFailure) onFailure(error);
      });
    runner[functionName].apply(runner, args || []);
  }

  function setLoading(isLoading, completed) {
    const bar = byId('loadingBar');
    if (!bar) return;
    if (isLoading) {
      AppState.loadingCount += 1;
      bar.classList.remove('done');
      bar.classList.add('active');
      return;
    }
    AppState.loadingCount = Math.max(0, AppState.loadingCount - 1);
    if (AppState.loadingCount === 0) {
      bar.classList.remove('active');
      if (completed) {
        bar.classList.add('done');
        setTimeout(function () { bar.classList.remove('done'); }, 280);
      }
    }
  }

  function showToast(message, type) {
    const toast = document.createElement('div');
    toast.className = 'toast ' + (type || 'success');
    toast.textContent = message;
    byId('toastHost').appendChild(toast);
    setTimeout(function () {
      toast.remove();
    }, type === 'error' ? 7000 : 4200);
  }

  function setButtonBusy(button, busy) {
    if (!button) return;
    button.disabled = busy;
    button.dataset.originalText = button.dataset.originalText || button.textContent;
    button.textContent = busy ? 'Processing...' : button.dataset.originalText;
  }

  function renderCell(value, key) {
    const text = valueOrNA(value);
    if (text === 'NA') return badge(text, 'na');
    if (key && key.toLowerCase().indexOf('status') !== -1) return badge(text, 'status');
    if (key === 'Priority Level' || key === 'priorityLevel') return badge(text, 'priority');
    if (key === 'Is Archived' || key === 'Is Active') return badge(text, 'flag');
    return escapeHtml(text);
  }

  function badge(value, type) {
    const text = valueOrNA(value);
    const className = badgeClass(text, type);
    return '<span class="badge ' + className + '">' + escapeHtml(text) + '</span>';
  }

  function badgeClass(value, type) {
    const normalized = lower(value).replace(/\s+/g, '-');
    if (value === 'NA') return 'badge-gray';
    if (type === 'priority') {
      if (value === 'Critical') return 'badge-critical';
      if (value === 'High') return 'badge-high';
      if (value === 'Medium') return 'badge-medium';
      if (value === 'Overdue') return 'badge-critical';
      if (value === 'Due today') return 'badge-red';
      if (value === 'Due within 15 days') return 'badge-high';
      if (value === 'Due within 30 days') return 'badge-medium';
      if (value === 'Due within 1 month') return 'badge-yellow';
      if (value === 'Due within 3 months') return 'badge-blue';
      return 'badge-low';
    }
    if (value === 'In-process') return 'badge-blue';
    if (value === 'Routing') return 'badge-yellow';
    if (value === 'Client Approval') return 'badge-purple';
    if (value === 'Signed' || value === 'Closed' || value === 'Done' || value === 'Yes' || value === 'Active') return 'badge-green';
    if (value === 'Cancelled' || value === 'Inactive' || value === 'No') return 'badge-red';
    if (value === 'Open' || value === 'Ongoing' || value === 'Planned') return 'badge-blue';
    return 'badge-gray';
  }

  function rowMatchesSearch(row, search) {
    return Object.keys(row).some(function (key) {
      return lower(row[key]).indexOf(search) !== -1;
    });
  }

  function rowMatchesFieldSearch(row, search, fields) {
    return (fields || []).some(function (key) {
      return lower(getValue(row, key)).indexOf(search) !== -1;
    });
  }

  function enrichEndorsementRow(row) {
    const output = Object.assign({}, row);
    const trace = findCnfTraceForEndorsement(row);
    output['CNF Categorization'] = getValue(row, 'CNF Categorization') !== 'NA' ? getValue(row, 'CNF Categorization') : trace.category;
    const priority = calculateClientPriority(row['Target Implementation Date'], 'Endorsement item');
    output['Days Remaining'] = priority.daysRemaining === null ? 'NA' : String(priority.daysRemaining);
    output['Priority Level'] = priority.level;
    output['Critical Reason'] = priority.reason;
    return output;
  }

  function findCnfTraceForEndorsement(row) {
    const match = AppState.cnfRows.find(function (cnf) {
      const endorsementMatch = getValue(row, 'Endorsement No.') !== 'NA' && getValue(cnf, 'Endorsement No.') === getValue(row, 'Endorsement No.');
      const cnfMatch = getValue(row, 'CNF No.') !== 'NA' && getValue(cnf, 'CNF No.') === getValue(row, 'CNF No.');
      const codeMatch = getValue(row, 'Product Code') === 'NA' || getValue(cnf, 'Product Code') === getValue(row, 'Product Code');
      return (endorsementMatch || cnfMatch) && codeMatch;
    });
    return { category: match ? getValue(match, 'CNF Categorization') : 'NA' };
  }

  function calculateClientPriority(value, subject) {
    const date = parseDate(value);
    if (!date) return { level: 'NA', daysRemaining: null, rank: 999, reason: 'No target date is available.' };
    const today = new Date();
    const base = new Date(today.getFullYear(), today.getMonth(), today.getDate());
    const days = Math.ceil((date.getTime() - base.getTime()) / (24 * 60 * 60 * 1000));
    if (days < 0) return { level: 'Overdue', daysRemaining: days, rank: 1, reason: subject + ' is overdue.' };
    if (days === 0) return { level: 'Due today', daysRemaining: days, rank: 2, reason: subject + ' is due today.' };
    if (days === 1) return { level: 'Due within 15 days', daysRemaining: days, rank: 3, reason: subject + ' is due tomorrow.' };
    if (days <= 3) return { level: 'Due within 15 days', daysRemaining: days, rank: 3, reason: subject + ' is due within 3 days.' };
    if (days <= 15) return { level: 'Due within 15 days', daysRemaining: days, rank: 3, reason: subject + ' is due within 15 days.' };
    if (days <= 30) return { level: 'Due within 30 days', daysRemaining: days, rank: 4, reason: subject + ' is due within 30 days.' };
    if (days <= 31) return { level: 'Due within 1 month', daysRemaining: days, rank: 5, reason: subject + ' is due within 1 month.' };
    if (days <= 90) return { level: 'Due within 3 months', daysRemaining: days, rank: 6, reason: subject + ' is due within 3 months.' };
    return { level: 'NA', daysRemaining: days, rank: 999, reason: 'No priority window applies.' };
  }

  function endorsementMatchesFocus(row, focus) {
    if (!focus) return true;
    if (focus.endorsementId && focus.endorsementId !== 'NA') return getValue(row, 'Endorsement ID') === focus.endorsementId;
    return (!focus.cnfNo || getValue(row, 'CNF No.') === focus.cnfNo) &&
      (!focus.endorsementNo || focus.endorsementNo === 'NA' || getValue(row, 'Endorsement No.') === focus.endorsementNo) &&
      (!focus.productCode || focus.productCode === 'NA' || getValue(row, 'Product Code') === focus.productCode);
  }

  function sortPriorityRows(rows) {
    return rows.slice().sort(function (a, b) {
      const rankDiff = Number(a.priorityRank || 999) - Number(b.priorityRank || 999);
      if (rankDiff !== 0) return rankDiff;
      return Number(a.daysRemaining || 9999) - Number(b.daysRemaining || 9999);
    });
  }

  function validateClientRequired(payload, fields) {
    return fields.filter(function (field) {
      return valueOrNA(payload[field]) === 'NA';
    });
  }

  function getValue(row, key) {
    if (!row) return 'NA';
    const value = row[key];
    return value === undefined || value === null || String(value).trim() === '' ? 'NA' : String(value).trim();
  }

  function getInputValue(id, fallback) {
    const input = byId(id);
    if (!input) return fallback === undefined ? '' : fallback;
    return input.value;
  }

  function valueOrNA(value) {
    if (value === undefined || value === null) return 'NA';
    const text = String(value).trim();
    return text === '' ? 'NA' : text;
  }

  function lower(value) {
    return valueOrNA(value).toLowerCase();
  }

  function escapeHtml(value) {
    return String(value === undefined || value === null ? '' : value)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#039;');
  }

  function csvEscape(value) {
    const text = valueOrNA(value);
    return '"' + text.replace(/"/g, '""') + '"';
  }

  function tsvEscape(value) {
    return valueOrNA(value).replace(/\t/g, ' ').replace(/\r?\n/g, ' ');
  }

  function getYearFromText(value) {
    const text = valueOrNA(value);
    let match = text.match(/\b(\d{4})\b/);
    return match ? match[1] : '';
  }

  function getErrorMessage(error) {
    const name = String(arguments[1] || '').toLowerCase();
    if (name.indexOf('save') !== -1) return 'Unable to save the record. Please try again.';
    if (name.indexOf('update') !== -1) return 'Unable to update the record. Please try again.';
    if (name.indexOf('delete') !== -1) return 'Unable to delete the record. Please try again.';
    if (name.indexOf('archive') !== -1) return 'Unable to complete the operation. Please try again.';
    if (name.indexOf('restore') !== -1) return 'Unable to complete the operation. Please try again.';
    if (name.indexOf('import') !== -1) return 'Unable to complete the operation. Please try again.';
    if (name.indexOf('getpagedsheetdata') !== -1 || name.indexOf('getsheetdata') !== -1) return 'Unable to load table data. Please refresh this menu.';
    if (name.indexOf('getdashboard') !== -1) return 'Unable to load dashboard data. Please refresh this menu.';
    if (name.indexOf('getregistry') !== -1) return 'Unable to load dropdown values. Please refresh this menu.';
    return 'Operation failed. Please try again.';
  }

  function byId(id) {
    return document.getElementById(id);
  }

  function setText(id, value) {
    byId(id).textContent = value;
  }
</script>
