<style>
  :root {
    --sidebar: #22352f;
    --sidebar-ink: #f3faf7;
    --sidebar-muted: #b7cbc4;
    --bg: #f4f7f6;
    --panel: #ffffff;
    --ink: #1f2933;
    --muted: #64748b;
    --line: #dbe3e1;
    --accent: #0f8b8d;
    --accent-dark: #0a6d70;
    --blue: #2563eb;
    --yellow: #b7791f;
    --purple: #7c3aed;
    --green: #15803d;
    --red: #c2410c;
    --gray: #667085;
    --shadow: 0 12px 30px rgba(17, 24, 39, 0.08);
  }

  * {
    box-sizing: border-box;
  }

  html,
  body {
    margin: 0;
    min-height: 100%;
    font-family: Arial, Helvetica, sans-serif;
    color: var(--ink);
    background: var(--bg);
    letter-spacing: 0;
  }

  body {
    overflow-x: hidden;
  }

  button,
  input,
  select,
  textarea {
    font: inherit;
  }

  button {
    cursor: pointer;
  }

  .loading-bar {
    position: fixed;
    z-index: 1000;
    top: 0;
    left: 0;
    height: 3px;
    width: 0;
    background: linear-gradient(90deg, var(--accent), #e2a72e, #cf3f3f);
    opacity: 0;
    transition: width 220ms ease, opacity 160ms ease;
  }

  .loading-bar.active {
    opacity: 1;
    width: 72%;
  }

  .loading-bar.done {
    opacity: 0;
    width: 100%;
  }

  .app-shell {
    display: flex;
    min-height: 100vh;
  }

  .sidebar {
    position: fixed;
    inset: 0 auto 0 0;
    width: 260px;
    display: flex;
    flex-direction: column;
    gap: 24px;
    padding: 22px 16px;
    color: var(--sidebar-ink);
    background: var(--sidebar);
    border-right: 1px solid rgba(255, 255, 255, 0.1);
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 12px;
    min-height: 58px;
  }

  .brand-mark {
    display: grid;
    place-items: center;
    width: 46px;
    height: 46px;
    border: 1px solid rgba(255, 255, 255, 0.24);
    border-radius: 8px;
    background: #f7fbfa;
    color: var(--sidebar);
    font-weight: 800;
  }

  .brand-title {
    font-size: 18px;
    font-weight: 800;
  }

  .brand-subtitle {
    margin-top: 3px;
    color: var(--sidebar-muted);
    font-size: 12px;
  }

  .nav-list {
    display: grid;
    gap: 6px;
  }

  .nav-item {
    width: 100%;
    min-height: 42px;
    padding: 10px 12px;
    border: 0;
    border-radius: 8px;
    color: var(--sidebar-ink);
    background: transparent;
    text-align: left;
    font-weight: 700;
  }

  .nav-item:hover,
  .nav-item.active {
    background: rgba(255, 255, 255, 0.12);
  }

  .sidebar-footer {
    margin-top: auto;
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--sidebar-muted);
    font-size: 12px;
  }

  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #6ee7b7;
  }

  .main {
    width: calc(100% - 260px);
    margin-left: 260px;
    padding: 22px;
  }

  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 18px;
  }

  .topbar h1 {
    margin: 0;
    font-size: 28px;
    line-height: 1.2;
  }

  .topbar p {
    margin: 5px 0 0;
    color: var(--muted);
    font-size: 13px;
  }

  .topbar-actions,
  .button-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .icon-button,
  .notification-button,
  .primary-button,
  .secondary-button,
  .danger-button {
    min-height: 38px;
    border-radius: 8px;
    border: 1px solid var(--line);
    background: #ffffff;
    color: var(--ink);
    font-weight: 700;
  }

  .icon-button {
    width: 38px;
    padding: 0;
    font-size: 18px;
  }

  .notification-button {
    position: relative;
    display: grid;
    place-items: center;
    width: 44px;
    padding: 0;
  }

  .bell-shape {
    position: relative;
    width: 15px;
    height: 17px;
    border: 2px solid var(--ink);
    border-top-left-radius: 8px;
    border-top-right-radius: 8px;
    border-bottom: 0;
  }

  .bell-shape::after {
    content: "";
    position: absolute;
    left: -4px;
    right: -4px;
    bottom: -4px;
    height: 2px;
    border-radius: 99px;
    background: var(--ink);
  }

  .notification-count {
    position: absolute;
    top: -6px;
    right: -6px;
    display: grid;
    place-items: center;
    min-width: 20px;
    height: 20px;
    padding: 0 5px;
    border-radius: 99px;
    background: #cf3f3f;
    color: #ffffff;
    font-size: 11px;
    font-weight: 800;
  }

  .primary-button,
  .secondary-button,
  .danger-button {
    padding: 0 14px;
  }

  .primary-button {
    border-color: var(--accent);
    background: var(--accent);
    color: #ffffff;
  }

  .primary-button:hover {
    background: var(--accent-dark);
  }

  .secondary-button:hover,
  .icon-button:hover,
  .notification-button:hover {
    border-color: #afc0bd;
    background: #f8fbfa;
  }

  .danger-button {
    border-color: #f2b5a4;
    background: #fff7f4;
    color: #a23418;
  }

  .page {
    display: none;
  }

  .page.active {
    display: block;
  }

  .panel {
    width: 100%;
    margin-bottom: 18px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: var(--panel);
    box-shadow: var(--shadow);
  }

  .panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 16px;
    border-bottom: 1px solid var(--line);
  }

  .panel-header h2 {
    margin: 0;
    font-size: 18px;
  }

  .workspace-hero {
    display: flex;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 16px;
    padding: 4px 0;
  }

  .workspace-hero h2 {
    margin: 4px 0;
    font-size: 30px;
    line-height: 1.15;
  }

  .workspace-hero p,
  .cnf-inline-header p,
  .branch-panel .panel-header p {
    margin: 0;
    color: var(--muted);
    font-size: 13px;
    line-height: 1.4;
  }

  .eyebrow {
    margin: 0;
    color: var(--accent-dark);
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 0;
    text-transform: uppercase;
  }

  .cnf-form-layout {
    display: grid;
    grid-template-columns: minmax(0, 1fr) minmax(300px, 360px);
    gap: 14px;
    align-items: start;
    margin-bottom: 18px;
  }

  .cnf-inline-header {
    align-items: flex-start;
  }

  .cnf-inline-header h2 {
    margin-bottom: 3px;
  }

  .inline-form-body {
    padding: 16px;
  }

  .form-notifications {
    display: grid;
    gap: 10px;
    padding: 0 16px;
  }

  .notification-panel {
    border-radius: 8px;
    border: 1px solid var(--line);
    background: #ffffff;
    font-size: 13px;
    line-height: 1.4;
    overflow: hidden;
  }

  .notification-panel.critical {
    border-left: 4px solid var(--red);
    background: #fff7f4;
  }

  .notification-panel.warning {
    border-left: 4px solid var(--yellow);
    background: #fffdf3;
  }

  .notification-panel summary {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 12px 14px;
    cursor: pointer;
    color: #30414b;
    font-weight: 800;
    list-style: none;
  }

  .notification-panel summary::-webkit-details-marker {
    display: none;
  }

  .notification-panel summary::before {
    content: "▸";
    color: var(--muted);
    font-size: 13px;
    transition: transform 120ms ease;
  }

  .notification-panel[open] summary::before {
    transform: rotate(90deg);
  }

  .notification-panel summary span:first-child {
    flex: 1;
  }

  .notification-panel ol {
    margin: 0 14px 14px;
    padding-left: 26px;
  }

  .notice-count {
    display: inline-grid;
    place-items: center;
    min-width: 24px;
    height: 24px;
    padding: 0 7px;
    border-radius: 999px;
    background: #eef1f4;
    color: #52606d;
    font-size: 12px;
    font-weight: 800;
  }

  .cnf-editor-panel .form-section:last-child {
    margin-bottom: 0;
  }

  .branch-status-list {
    display: grid;
    gap: 12px;
    max-height: calc(100vh - 245px);
    overflow: auto;
    padding: 14px;
  }

  .branch-product {
    display: grid;
    gap: 9px;
  }

  .branch-product-title {
    color: #30414b;
    font-size: 13px;
    font-weight: 800;
  }

  .branch-card {
    display: grid;
    gap: 5px;
    padding: 11px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: #fbfdfc;
  }

  .branch-card.clickable-branch {
    cursor: pointer;
    border-color: #9db7b1;
  }

  .branch-card.clickable-branch:hover {
    background: #eef7f5;
  }

  .branch-card span:first-child {
    color: var(--muted);
    font-size: 11px;
    font-weight: 800;
    text-transform: uppercase;
  }

  .branch-card strong {
    overflow-wrap: anywhere;
    font-size: 13px;
  }

  .registry-toolbar {
    display: grid;
    gap: 10px;
    padding: 24px 30px 18px;
    border-bottom: 1px solid var(--line);
  }

  .registry-toolbar {
    grid-template-columns: 260px minmax(220px, 1fr) 40px auto;
  }

  .registry-toolbar input,
  .registry-toolbar select {
    width: 100%;
    min-height: 38px;
    padding: 8px 10px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: #ffffff;
    color: var(--ink);
  }

  .simplified-tools label {
    display: grid;
    gap: 5px;
    color: var(--muted);
    font-size: 11px;
    font-weight: 800;
  }

  .simplified-tools label input,
  .simplified-tools label select {
    color: var(--ink);
    font-size: 13px;
    font-weight: 400;
  }

  .simplified-tools .span-2 {
    grid-column: span 2;
  }

  .checkbox-field.billing-disabled {
    color: var(--muted);
    opacity: 0.72;
  }

  .checkbox-field.billing-disabled input {
    cursor: not-allowed;
  }

  .billing-helper {
    display: none;
    margin-left: 8px;
    color: var(--muted);
    font-size: 12px;
    font-weight: 400;
  }

  .billing-disabled .billing-helper {
    display: inline;
  }

  .compact-action {
    width: 40px;
    min-width: 40px;
    padding: 0;
    font-size: 22px;
    line-height: 1;
  }

  .registry-list {
    display: grid;
    padding: 0 30px 28px;
  }

  .registry-row {
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto;
    align-items: center;
    gap: 12px;
    min-height: 58px;
    border-top: 1px solid var(--line);
  }

  .registry-row.inactive {
    opacity: 0.76;
  }

  .registry-value {
    display: grid;
    gap: 3px;
    min-width: 0;
    padding: 10px 0;
  }

  .registry-value strong {
    overflow-wrap: anywhere;
    font-size: 14px;
  }

  .registry-value span {
    color: var(--muted);
    font-size: 12px;
  }

  .registry-row-actions {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 7px;
    white-space: nowrap;
  }

  .registry-row-actions .row-action {
    margin-right: 0;
  }

  .registry-row-actions .danger {
    border-color: transparent;
    background: transparent;
    color: #e72d2d;
  }

  .card-grid {
    display: grid;
    gap: 12px;
  }

  .dashboard-cards {
    grid-template-columns: repeat(3, minmax(0, 1fr));
    margin-bottom: 18px;
  }

  .metric-card {
    min-height: 104px;
    padding: 16px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: #ffffff;
    box-shadow: var(--shadow);
  }

  .metric-card span {
    display: block;
    color: var(--muted);
    font-size: 13px;
    font-weight: 700;
  }

  .metric-card strong {
    display: block;
    margin-top: 10px;
    font-size: 32px;
    line-height: 1;
  }

  .metric-card.critical {
    border-left: 4px solid #cf3f3f;
  }

  .metric-card.high {
    border-left: 4px solid #e2a72e;
  }

  .table-tools {
    display: grid;
    grid-template-columns: repeat(4, minmax(140px, 1fr));
    gap: 10px;
    padding: 12px 16px;
    border-bottom: 1px solid var(--line);
  }

  .table-tools.compact {
    display: flex;
    padding: 0;
    border-bottom: 0;
  }

  .database-tools {
    grid-template-columns: repeat(4, minmax(150px, 1fr));
  }

  .endorsement-tools {
    grid-template-columns: minmax(220px, 2fr) repeat(3, minmax(150px, 1fr));
  }

  .audit-tools {
    grid-template-columns: repeat(4, minmax(150px, 1fr));
  }

  .priority-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 16px;
  }

  .priority-panel {
    min-width: 0;
  }

  .fixed-table {
    max-height: 430px;
    overflow: auto;
  }

  .table-tools input,
  .table-tools select,
  .form-grid input,
  .form-grid select,
  .form-grid textarea {
    width: 100%;
    min-height: 38px;
    padding: 8px 10px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: #ffffff;
    color: var(--ink);
  }

  .form-grid textarea {
    min-height: 88px;
    resize: vertical;
  }

  .form-grid input.na-guide,
  .form-grid select.na-guide,
  .form-grid textarea.na-guide {
    color: #8a98a6;
    background: #f8fafb;
  }

  .table-wrap {
    width: 100%;
    overflow: auto;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }

  th,
  td {
    padding: 10px 12px;
    border-bottom: 1px solid var(--line);
    text-align: left;
    vertical-align: top;
  }

  th {
    position: sticky;
    top: 0;
    z-index: 1;
    background: #f8fbfa;
    color: #394853;
    font-size: 12px;
    white-space: nowrap;
    user-select: none;
  }

  th.sortable {
    cursor: pointer;
  }

  tbody tr:hover {
    background: #fbfdfc;
  }

  tbody tr.clickable-row {
    cursor: pointer;
  }

  tbody tr.clickable-row:hover {
    background: #eef7f5;
  }

  tbody tr.highlight-row,
  tbody tr.highlight-row:hover {
    background: #fff8dc;
    box-shadow: inset 3px 0 0 #e2a72e;
  }

  td.remarks-cell {
    min-width: 260px;
    white-space: normal;
    line-height: 1.4;
  }

  td.missing-cell {
    background: #fffaf0;
  }

  td.missing-cell .badge {
    border-color: #f2d48a;
  }

  .table-footnote,
  .helper-note {
    padding: 10px 12px;
    color: var(--muted);
    font-size: 12px;
  }

  .inactive-product {
    background: #f5f7f8;
    opacity: 0.78;
  }

  .actions-cell {
    white-space: nowrap;
  }

  .row-action {
    min-height: 30px;
    margin-right: 5px;
    padding: 0 9px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: #ffffff;
    color: var(--ink);
    font-size: 12px;
    font-weight: 700;
  }

  .row-action:hover {
    background: #f2f7f6;
  }

  .row-action.danger {
    border-color: #f2b5a4;
    color: #a23418;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    min-height: 22px;
    padding: 3px 8px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 800;
    white-space: nowrap;
  }

  .badge-blue {
    background: #e8f0ff;
    color: var(--blue);
  }

  .badge-yellow {
    background: #fff6d8;
    color: var(--yellow);
  }

  .badge-purple {
    background: #f0e8ff;
    color: var(--purple);
  }

  .badge-green {
    background: #e7f7ed;
    color: var(--green);
  }

  .badge-red {
    background: #fff0e8;
    color: var(--red);
  }

  .badge-gray {
    background: #eef1f4;
    color: var(--gray);
  }

  .badge-critical {
    background: #ffe9e4;
    color: #b42318;
  }

  .badge-high {
    background: #fff2cc;
    color: #9a6700;
  }

  .badge-medium {
    background: #e9f7fb;
    color: #08748a;
  }

  .badge-low {
    background: #eef1f4;
    color: #52606d;
  }

  .modal-backdrop {
    position: fixed;
    z-index: 900;
    inset: 0;
    display: grid;
    place-items: center;
    padding: 20px;
    background: rgba(11, 18, 24, 0.42);
  }

  .modal-backdrop.hidden {
    display: none;
  }

  .modal {
    width: min(1080px, 96vw);
    max-height: 92vh;
    display: flex;
    flex-direction: column;
    border-radius: 8px;
    border: 1px solid var(--line);
    background: #ffffff;
    box-shadow: 0 24px 70px rgba(0, 0, 0, 0.24);
  }

  .modal-header,
  .modal-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 14px 16px;
    border-bottom: 1px solid var(--line);
  }

  .modal-footer {
    justify-content: flex-end;
    border-top: 1px solid var(--line);
    border-bottom: 0;
  }

  .modal-header h2 {
    margin: 0;
    font-size: 18px;
  }

  .modal-body {
    overflow: auto;
    padding: 16px;
  }

  .form-section {
    margin-bottom: 16px;
  }

  .form-section h3 {
    margin: 0 0 10px;
    font-size: 14px;
    color: #40515c;
  }

  .form-grid {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 12px;
  }

  .form-grid .span-2 {
    grid-column: span 2;
  }

  .form-grid .span-3 {
    grid-column: span 3;
  }

  .field label {
    display: block;
    margin-bottom: 5px;
    color: #40515c;
    font-size: 12px;
    font-weight: 800;
  }

  .batch-list {
    display: grid;
    gap: 8px;
  }

  .checkbox-field {
    display: flex;
    align-items: center;
    gap: 9px;
    min-height: 38px;
    color: #40515c;
    font-size: 13px;
    font-weight: 800;
  }

  .checkbox-field input {
    width: 16px;
    height: 16px;
  }

  .form-actions-bar {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 14px;
    padding-top: 14px;
    border-top: 1px solid var(--line);
  }

  .field-helper {
    color: var(--muted);
    font-size: 12px;
  }

  .batch-row {
    display: grid;
    grid-template-columns: minmax(0, 1fr) minmax(120px, 160px);
    gap: 10px;
    align-items: end;
  }

  .batch-row .field {
    min-width: 0;
  }

  .batch-row input {
    width: 100%;
    min-height: 38px;
    padding: 8px 10px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: #ffffff;
    color: var(--ink);
  }

  .batch-row input[readonly] {
    min-width: 0;
    text-align: center;
  }

  .product-toolbar {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    flex-wrap: wrap;
  }

  .product-section-list {
    display: grid;
    gap: 12px;
    margin-bottom: 16px;
  }

  .collapsible-section {
    border: 1px solid var(--line);
    border-radius: 8px;
    background: #ffffff;
  }

  .collapsible-section summary {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 12px 14px;
    border-bottom: 1px solid var(--line);
    color: #30414b;
    cursor: pointer;
    font-weight: 800;
  }

  .collapsible-section:not([open]) summary {
    border-bottom: 0;
  }

  .collapsible-section .form-section {
    padding: 14px;
    margin-bottom: 0;
  }

  .confirm-message {
    padding: 10px 0;
    color: #2f3d46;
    line-height: 1.5;
  }

  .import-errors {
    display: grid;
    gap: 6px;
    padding: 10px 12px;
    border: 1px solid #f2b5a4;
    border-radius: 8px;
    background: #fff7f4;
    color: #8f2f16;
    font-size: 13px;
    line-height: 1.4;
  }

  .readonly-grid {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 10px;
  }

  .readonly-item {
